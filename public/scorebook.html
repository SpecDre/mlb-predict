<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Scorebook — MLB Predict</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#d0c8b0;font-family:Arial,Helvetica,sans-serif;padding:8px;min-height:100vh}
.wrap{max-width:1200px;margin:0 auto;overflow-x:auto}
a{color:#000}
.hdr-table{border-collapse:collapse;border:3px solid #000;width:100%;background:#fff;margin-bottom:0}
.hdr-table td{border:2px solid #000;padding:5px 8px;font-size:12px}
.toggle{display:flex;margin:6px 0}
.toggle button{padding:5px 18px;font-size:12px;font-family:Arial;cursor:pointer;border:2px solid #000}
.toggle .active{background:#000;color:#fff;font-weight:bold}
.toggle .inactive{background:#fff;color:#000;font-weight:normal}
.toggle button:first-child{border-radius:3px 0 0 3px}
.toggle button:last-child{border-radius:0 3px 3px 0;border-left:0}
.sb{border-collapse:collapse;border:3px solid #000;background:#fff}
.sb th,.sb td{border:2px solid #000}
.sb thead th{background:#000;color:#fff;padding:6px 2px;font-size:13px}
.inn-cell{width:82px;height:82px;padding:0;background:#fff;position:relative}
.inn-cell.dead{background:#3a3a3a}
.inn-cell.score-cell{background:#d4edda}
.stat-col{width:28px;text-align:center;font-size:12px;font-weight:bold;vertical-align:middle}
.sum-runs{color:#c02020}
.cell-nota{position:absolute;top:38px;left:50%;transform:translate(-50%,-50%);font-size:10px;font-weight:bold;z-index:1}
.cell-nota.hit{color:#2a8a2a}.cell-nota.hr{color:#2a8a2a;font-size:11px}.cell-nota.out{color:#c02020}.cell-nota.walk{color:#2A6CB6}.cell-nota.error{color:#BA7517}
.cell-pc{display:none}
.cell-rbi{position:absolute;left:28px;bottom:3px;font-size:7px;font-weight:bold;color:#c02020;z-index:1}
.bottom{display:flex;gap:16px;margin-top:8px;align-items:flex-start;flex-wrap:wrap}
.pit-table,.cat-table{border-collapse:collapse;border:3px solid #000;background:#fff}
.pit-table th,.pit-table td,.cat-table th,.cat-table td{border:2px solid #000}
.pit-table thead th,.cat-table thead th{background:#000;color:#fff;padding:4px 4px;font-size:11px}
.pit-table td,.cat-table td{height:22px;font-size:10px;text-align:center}
.live-badge{display:inline-flex;align-items:center;gap:4px;background:#c02020;color:#fff;font-size:9px;font-weight:bold;padding:2px 8px;border-radius:10px}
.live-dot{width:6px;height:6px;border-radius:50%;background:#fff;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.back{display:inline-block;margin-bottom:6px;font-size:11px;color:#555;text-decoration:none}
.loading{text-align:center;padding:40px;font-size:13px;color:#555}
.game-notes{margin-top:6px;font-size:10px;color:#555;line-height:1.6}
</style>
</head>
<body>
<div class="wrap">
<a href="/" class="back">&larr; Back to MLB Predict</a>
<div id="content"><div class="loading">Loading scorebook...</div></div>
</div>
<script>
var PROXY='/api/proxy',gamePk=new URLSearchParams(location.search).get('gamePk'),gameData=null,currentTeam='away',refreshTimer=null,CW=82,CH=82;

function fetchGame(){
if(!gamePk){document.getElementById('content').innerHTML='<div class="loading">No gamePk. Add ?gamePk=XXXXX</div>';return}
fetch(PROXY+'?mlbpath=/api/v1.1/game/'+gamePk+'/feed/live').then(function(r){return r.json()}).then(function(d){
gameData=d;renderAll();
var st=d.gameData&&d.gameData.status&&d.gameData.status.abstractGameState;
if(st==='Live'){if(!refreshTimer)refreshTimer=setInterval(fetchGame,15000)}
else{if(refreshTimer){clearInterval(refreshTimer);refreshTimer=null}}
}).catch(function(e){document.getElementById('content').innerHTML='<div class="loading">Error: '+e.message+'</div>'});
}

function setTeam(t){currentTeam=t;renderAll()}

function dsvg(bases,play){
var cx=CW/2,cy=CH*0.46,r=Math.min(CW,CH)*0.18;
var T={x:cx,y:cy-r},R={x:cx+r,y:cy},Bo={x:cx,y:cy+r},L={x:cx-r,y:cy},bm=2.8;
var b1=bases&&bases.first,b2=bases&&bases.second,b3=bases&&bases.third,bH=bases&&bases.home;
var balls=play?play.balls:0,strikes=play?play.strikes:0,outs=play?play.outs:0;
var ev=play?play.ev:'';
// Map event to which label to circle
var resultLabel='';
if(ev==='Single')resultLabel='1B';
if(ev==='Double')resultLabel='2B';
if(ev==='Triple')resultLabel='3B';
if(ev==='Home Run')resultLabel='HR';
if(ev==='Walk'||ev==='Intent Walk'||ev==='Hit By Pitch')resultLabel='BB';
if(ev==='Field Error')resultLabel='E';
if(ev==='Fielders Choice'||ev==='Fielders Choice Out')resultLabel='FC';
if(ev==='Sac Fly'||ev==='Sac Bunt'||ev==='Sacrifice Bunt')resultLabel='SAC';
var s='<svg width="'+CW+'" height="'+CH+'" viewBox="0 0 '+CW+' '+CH+'">';
// Top labels — color the result text (green=hit, blue=walk, red=error)
var lbs=['1B','2B','3B','HR','BB'],gap=(CW-6)/5;
var lblCol={'1B':'#2a8a2a','2B':'#2a8a2a','3B':'#2a8a2a','HR':'#2a8a2a','BB':'#2A6CB6','E':'#c02020','FC':'#BA7517','SAC':'#555'};
for(var i=0;i<5;i++){
var lx=3+i*gap+gap/2,ly=10;
var isResult=lbs[i]===resultLabel;
s+='<text x="'+lx+'" y="'+ly+'" text-anchor="middle" fill="'+(isResult?lblCol[resultLabel]||'#c02020':'#000')+'" font-size="'+(isResult?'9':'8')+'" font-weight="bold" font-family="Arial">'+lbs[i]+'</text>';
}
// Diamond
s+='<polygon points="'+T.x+','+T.y+' '+R.x+','+R.y+' '+Bo.x+','+Bo.y+' '+L.x+','+L.y+'" fill="none" stroke="#000" stroke-width="1.2"/>';
if(b1)s+='<line x1="'+Bo.x+'" y1="'+Bo.y+'" x2="'+R.x+'" y2="'+R.y+'" stroke="#2a8a2a" stroke-width="2.5"/>';
if(b2)s+='<line x1="'+R.x+'" y1="'+R.y+'" x2="'+T.x+'" y2="'+T.y+'" stroke="#2a8a2a" stroke-width="2.5"/>';
if(b3)s+='<line x1="'+T.x+'" y1="'+T.y+'" x2="'+L.x+'" y2="'+L.y+'" stroke="#2a8a2a" stroke-width="2.5"/>';
if(bH)s+='<line x1="'+L.x+'" y1="'+L.y+'" x2="'+Bo.x+'" y2="'+Bo.y+'" stroke="#2a8a2a" stroke-width="2.5"/>';
var pts=[T,R,Bo,L],fl=[b2,b1,false,b3];
for(var j=0;j<4;j++){var p=pts[j];s+='<polygon points="'+p.x+','+(p.y-bm)+' '+(p.x+bm)+','+p.y+' '+p.x+','+(p.y+bm)+' '+(p.x-bm)+','+p.y+'" fill="'+(fl[j]?'#2a8a2a':'none')+'" stroke="#000" stroke-width="0.6"/>';}
// Right labels — color the result text
var rLabels=[{l:'E',y:cy-r+4},{l:'FC',y:cy+1},{l:'SAC',y:cy+r-2}];
for(var ri=0;ri<3;ri++){var rl=rLabels[ri];var isR=rl.l===resultLabel;
s+='<text x="'+(CW-2)+'" y="'+rl.y+'" text-anchor="end" fill="'+(isR?lblCol[resultLabel]||'#c02020':'#000')+'" font-size="'+(isR?'9':'8')+'" font-weight="bold">'+rl.l+'</text>';}
// B boxes — fill based on ball count
s+='<text x="8" y="'+(CH-30)+'" text-anchor="middle" fill="#000" font-size="7" font-weight="bold">B</text>';
for(var bn=3;bn>=1;bn--){var bi=3-bn;var bFill=balls>=bn?'#000':'none';
s+='<rect x="3" y="'+(CH-28+bi*8)+'" width="9" height="7" fill="'+bFill+'" stroke="#000" stroke-width="0.6"/>';
s+='<text x="7.5" y="'+(CH-24.5+bi*8)+'" text-anchor="middle" dominant-baseline="central" fill="'+(balls>=bn?'#fff':'#000')+'" font-size="6.5" font-weight="bold">'+bn+'</text>';}
// S boxes — fill based on strike count
s+='<text x="18" y="'+(CH-22)+'" text-anchor="middle" fill="#000" font-size="7" font-weight="bold">S</text>';
for(var sn=2;sn>=1;sn--){var si=2-sn;var sFill=strikes>=sn?'#000':'none';
s+='<rect x="13" y="'+(CH-20+si*8)+'" width="9" height="7" fill="'+sFill+'" stroke="#000" stroke-width="0.6"/>';
s+='<text x="17.5" y="'+(CH-16.5+si*8)+'" text-anchor="middle" dominant-baseline="central" fill="'+(strikes>=sn?'#fff':'#000')+'" font-size="6.5" font-weight="bold">'+sn+'</text>';}
// OUTS boxes — only fill when THIS batter made an out
var isOut=play&&(play.t==='out');
for(var on=1;on<=3;on++){var oi=on-1;var oFill=isOut&&outs>=on?'#000':'none';
s+='<rect x="'+(CW-30+oi*9)+'" y="'+(CH-20)+'" width="8" height="7" fill="'+oFill+'" stroke="#000" stroke-width="0.6"/>';
s+='<text x="'+(CW-26+oi*9)+'" y="'+(CH-16.5)+'" text-anchor="middle" dominant-baseline="central" fill="'+(oFill==='#000'?'#fff':'#000')+'" font-size="6.5" font-weight="bold">'+on+'</text>';}
s+='<text x="'+(CW-12)+'" y="'+(CH-5)+'" text-anchor="middle" fill="#000" font-size="7" font-weight="bold">OUTS</text>';
// Pitch count
s+='<text x="'+cx+'" y="'+(CH-5)+'" text-anchor="middle" fill="'+(play&&play.pc?'#555':'#bbb')+'" font-size="7" font-style="italic">'+((play&&play.pc)?'PC:'+play.pc:'PC')+'</text>';
// Trajectory line from home plate
if(play&&play.hc){
var hx=play.hc.coordX,hy=play.hc.coordY;
var dx=hx-125,dy=200-hy;
var ang=Math.atan2(dx,dy);
var dist=Math.sqrt(dx*dx+dy*dy);
var lineLen=Math.min(30,dist*0.22);
var endX=Bo.x+Math.sin(ang)*lineLen;
var endY=Bo.y-Math.cos(ang)*lineLen;
var tCol=play.t==='hr'?'#DAA520':play.t==='hit'?'#2a8a2a':play.t==='error'?'#BA7517':'#c02020';
s+='<line x1="'+Bo.x+'" y1="'+Bo.y+'" x2="'+endX.toFixed(1)+'" y2="'+endY.toFixed(1)+'" stroke="'+tCol+'" stroke-width="1.8" opacity="0.7"/>';
s+='<circle cx="'+endX.toFixed(1)+'" cy="'+endY.toFixed(1)+'" r="2" fill="'+tCol+'" opacity="0.8"/>';
}
s+='</svg>';return s;
}

function nota(ev,credits){
// Build defensive notation from fielding credits
if(credits&&credits.length>0){
var assists=[],putouts=[];
credits.forEach(function(c){if(c.credit==='f_assist')assists.push(c.pos);if(c.credit==='f_putout')putouts.push(c.pos);if(c.credit==='f_fielded_error')assists.push(c.pos);});
// Fly/line/pop outs: F9, L8, P5
if(ev==='Flyout'&&putouts.length)return'F'+putouts[0];
if(ev==='Lineout'&&putouts.length)return'L'+putouts[0];
if(ev==='Pop Out'&&putouts.length)return'P'+putouts[0];
// Ground outs: 6-3, 4-3, etc
if(ev==='Groundout'&&(assists.length||putouts.length)){var play=assists.concat(putouts);return play.join('-');}
if(ev==='Force Out'&&(assists.length||putouts.length)){var play2=assists.concat(putouts);return play2.join('-');}
if((ev==='Grounded Into DP'||ev==='Double Play')&&(assists.length||putouts.length)){var play3=assists.concat(putouts);return play3.join('-')+'DP';}
if(ev==='Sac Fly'&&putouts.length)return'SF'+putouts[0];
if(ev==='Sac Bunt'||ev==='Sacrifice Bunt'){var play4=assists.concat(putouts);return play4.length?'SAC'+play4.join('-'):'SAC';}
if(ev==='Field Error'&&assists.length)return'E'+assists[0];
if(ev==='Fielders Choice'||ev==='Fielders Choice Out'){var play5=assists.concat(putouts);return'FC'+play5.join('-');}
}
var m={'Strikeout':'K','Strikeout Looking':'\u{A741}','Strikeout Swinging':'K','Walk':'BB','Intent Walk':'IBB','Hit By Pitch':'HBP','Single':'1B','Double':'2B','Triple':'3B','Home Run':'HR','Groundout':'GO','Flyout':'FO','Lineout':'LO','Pop Out':'PO','Grounded Into DP':'GDP','Double Play':'DP','Sac Fly':'SF','Sac Bunt':'SAC','Sacrifice Bunt':'SAC','Field Error':'E','Fielders Choice':'FC','Fielders Choice Out':'FC','Force Out':'FO','Catcher Interf':'CI'};return m[ev]||ev.substring(0,3).toUpperCase();
}
function gtype(ev){if(['Single','Double','Triple'].indexOf(ev)>=0)return'hit';if(ev==='Home Run')return'hr';if(['Walk','Intent Walk','Hit By Pitch'].indexOf(ev)>=0)return'walk';if(ev==='Field Error')return'error';return'out';}

function renderAll(){
if(!gameData||!gameData.liveData)return;
var gd=gameData.gameData,ld=gameData.liveData,aw=gd.teams.away,ho=gd.teams.home;
var box=ld.boxscore,plays=ld.plays;if(!box||!plays)return;
var side=currentTeam,opp=side==='away'?'home':'away';
var td=box.teams[side],od=box.teams[opp],pl=td.players||{},opl=od.players||{};
var bo=td.battingOrder||[],state=gd.status&&gd.status.abstractGameState||'';
var ti=Math.max(9,(ld.linescore&&ld.linescore.innings?ld.linescore.innings.length:9));
var bm={},os=[],subs=[],runnerAdv={};
// Collect substitutions
(plays.allPlays||[]).forEach(function(p){
(p.playEvents||[]).forEach(function(e){
if(e.type==='action'&&e.details){
var desc=e.details.description||'';
var ev=e.details.event||'';
var isT=p.about.isTopInning,inn=p.about.inning;
if((side==='away'&&!isT)||(side==='home'&&isT)){
if(ev.indexOf('Substitution')>=0||ev.indexOf('Switch')>=0||ev.indexOf('remains')>=0){
subs.push({inn:inn,desc:desc});
}}
// Track SB/CS/WP/PB/BK for runner advancement
if(ev.indexOf('Stolen Base')>=0||ev.indexOf('Caught Stealing')>=0||ev.indexOf('Wild Pitch')>=0||ev.indexOf('Passed Ball')>=0||ev.indexOf('Balk')>=0){
if((side==='away'&&isT)||(side==='home'&&!isT)){
// Find which runner
(p.runners||[]).forEach(function(r){
if(r.details&&!r.details.isBatter&&r.movement&&r.movement.start){
var rid=r.details.runner&&r.details.runner.id;
if(rid){
var key=rid+'_'+inn;
if(!runnerAdv[key])runnerAdv[key]=[];
var shortEv=ev.indexOf('Stolen')>=0?'SB':ev.indexOf('Caught')>=0?'CS':ev.indexOf('Wild')>=0?'WP':ev.indexOf('Passed')>=0?'PB':'BK';
runnerAdv[key].push(shortEv);
}}});
}}
}});
});

(plays.allPlays||[]).forEach(function(p){
if(!p.about||!p.matchup||!p.result||!p.result.event)return;
var isT=p.about.isTopInning,inn=p.about.inning;
if((side==='away'&&!isT)||(side==='home'&&isT))return;
var bid=p.matchup.batter&&p.matchup.batter.id;if(!bid)return;
if(!bm[bid]){var pd=pl['ID'+bid]||{};bm[bid]={id:bid,name:p.matchup.batter.fullName||'?',pos:pd.position&&pd.position.abbreviation||'',num:pd.jerseyNumber||'',ab:{}};os.push(bid);}
if(!bm[bid].ab[inn])bm[bid].ab[inn]=[];
var bases={first:false,second:false,third:false,home:false};
// Collect defensive credits
var credits=[];
(p.runners||[]).forEach(function(r){
if(r.movement&&r.details&&r.details.isBatter){var e=r.movement.end;if(e==='1B')bases.first=true;if(e==='2B'){bases.first=true;bases.second=true}if(e==='3B'){bases.first=true;bases.second=true;bases.third=true}if(e==='score'){bases.first=true;bases.second=true;bases.third=true;bases.home=true}}
if(r.credits){r.credits.forEach(function(c){credits.push({pos:c.position&&c.position.code||'',credit:c.credit||''})});}
// Track non-batter runner advancement
if(r.details&&!r.details.isBatter&&r.movement&&r.movement.start&&r.movement.end){
var rid=r.details.runner&&r.details.runner.id;
if(rid&&r.movement.end!==r.movement.start){
var key=rid+'_'+inn;
if(!runnerAdv[key])runnerAdv[key]=[];
var mv=r.movement.start+'→'+r.movement.end;
if(r.movement.end==='score')mv=r.movement.start+'→H';
runnerAdv[key].push(mv);
}}
});
var pc=p.playEvents?p.playEvents.filter(function(e){return e.isPitch}).length:0;
var cnt=p.count||{};
var hitCoords=null;
var pevts=p.playEvents||[];
for(var ei=pevts.length-1;ei>=0;ei--){if(pevts[ei].hitData&&pevts[ei].hitData.coordinates){hitCoords=pevts[ei].hitData.coordinates;break;}}
bm[bid].ab[inn].push({ev:p.result.event,n:nota(p.result.event,credits),t:gtype(p.result.event),b:bases,pc:pc,rbi:p.result.rbi||0,balls:cnt.balls||0,strikes:cnt.strikes||0,outs:cnt.outs||0,hc:hitCoords});
});
var order=os;
var opIds=od.pitchers||[];
var wx=gd.weather||{},venue=gd.venue&&gd.venue.name||'',ds=gd.datetime&&gd.datetime.officialDate||'';
var st=gd.datetime&&gd.datetime.time?(gd.datetime.time+' '+(gd.datetime.ampm||'')):'';
var sc=['AB','H','BB','SO','R','RBI','E'],sl=['RUNS','HITS','LOB','ERRORS'],ls=ld.linescore;
var h='';
// Header
h+='<table class="hdr-table"><tbody><tr><td style="width:25%"><b>Date:</b> '+ds+'</td><td style="text-align:center;width:50%"><b>'+aw.name+' @ '+ho.name+'</b>';
if(state==='Live')h+=' <span class="live-badge"><span class="live-dot"></span>LIVE</span>';
else if(state==='Final')h+=' <span style="font-size:10px;color:#555">(FINAL)</span>';
h+='</td><td><b>Start:</b> '+st+'</td></tr>';
h+='<tr><td><b>'+aw.abbreviation+'</b> vs <b>'+ho.abbreviation+'</b></td><td style="text-align:center"><b>Field:</b> '+venue+'</td><td><b>Length:</b> '+(function(){var dm=gd.gameInfo&&gd.gameInfo.gameDurationMinutes;if(!dm)return'\u2014';var hrs=Math.floor(dm/60),mins=dm%60;return hrs+':'+(mins<10?'0':'')+mins;}())+'</td></tr>';
h+='<tr><td>'+(wx.temp?wx.temp+'\u00B0F, '+(wx.condition||''):'\u2014')+'</td><td style="text-align:center">'+(wx.wind?'Wind: '+wx.wind:'\u2014')+'</td><td><b>ATT:</b> '+(gd.gameInfo&&gd.gameInfo.attendance||'\u2014')+'</td></tr></tbody></table>';
// Toggle
h+='<div class="toggle"><button class="'+(side==='away'?'active':'inactive')+'" onclick="setTeam(\'away\')">'+aw.abbreviation+' (Batting)</button><button class="'+(side==='home'?'active':'inactive')+'" onclick="setTeam(\'home\')">'+ho.abbreviation+' (Batting)</button></div>';
// Grid
h+='<table class="sb"><thead><tr><th style="width:28px">#</th><th style="width:120px;text-align:left;padding-left:4px">BATTER</th>';
for(var i=1;i<=ti;i++)h+='<th style="width:82px;font-size:15px">'+i+'</th>';
for(var si2=0;si2<sc.length;si2++)h+='<th style="width:28px;font-size:10px">'+sc[si2]+'</th>';
h+='</tr></thead><tbody>';
order.forEach(function(pid,idx){
var b=bm[pid];if(!b){var pd=pl['ID'+pid]||{};b={id:pid,name:pd.person&&pd.person.fullName||'\u2014',pos:pd.position&&pd.position.abbreviation||'',num:pd.jerseyNumber||'',ab:{}};}
var ps=pl['ID'+pid],bt=ps&&ps.stats&&ps.stats.batting||{};
// Check for substitution info for this player
var subInfo='';
subs.forEach(function(s){if(s.desc.indexOf(b.name)>=0&&s.desc.indexOf('replaces')>=0)subInfo='<div style="font-size:7px;color:#c02020;margin-top:1px">IN: inn '+s.inn+'</div>';});
h+='<tr><td style="text-align:center;vertical-align:middle;font-size:14px;font-weight:bold">'+(idx+1)+'</td>';
h+='<td style="padding:2px 4px;vertical-align:top"><div style="font-size:11px;font-weight:bold;text-transform:uppercase">'+b.name+'</div><div style="font-size:8px">'+b.pos+(b.num?' #'+b.num:'')+'</div>'+subInfo+'</td>';
for(var inn=1;inn<=ti;inn++){
var abs=b.ab[inn];
if(abs&&abs.length>0){var a=abs[0];
h+='<td class="inn-cell'+(a.b&&a.b.home?' score-cell':'')+'">';
h+=dsvg(a.b,a);
h+='<div class="cell-nota '+a.t+'">'+a.n+'</div>';
if(a.rbi>0)h+='<div class="cell-rbi">'+a.rbi+'RBI</div>';
h+='</td>';
}else{h+='<td class="inn-cell dead"></td>';}
}
h+='<td class="stat-col">'+(bt.atBats||'')+'</td><td class="stat-col">'+(bt.hits||'')+'</td><td class="stat-col">'+(bt.baseOnBalls||'')+'</td><td class="stat-col">'+(bt.strikeOuts||'')+'</td><td class="stat-col">'+(bt.runs||'')+'</td><td class="stat-col">'+(bt.rbi||'')+'</td><td class="stat-col">'+(bt.errors||'')+'</td></tr>';
});
// Summary
sl.forEach(function(lb,ri){var rc=lb==='RUNS'?' sum-runs':'';
h+='<tr'+(ri===0?' style="border-top:3px solid #000"':'')+'><td colspan="2" style="text-align:right;padding:3px 8px;font-size:11px;font-weight:bold" class="'+rc+'">'+lb+'</td>';
for(var inn=1;inn<=ti;inn++){var v='';if(ls&&ls.innings&&ls.innings[inn-1]){var sd=side==='away'?ls.innings[inn-1].away:ls.innings[inn-1].home;if(sd){if(lb==='RUNS')v=sd.runs!=null?sd.runs:'';if(lb==='HITS')v=sd.hits!=null?sd.hits:'';if(lb==='ERRORS')v=sd.errors!=null?sd.errors:'';}}h+='<td style="text-align:center;font-size:13px;font-weight:bold;height:22px" class="'+rc+'">'+v+'</td>';}
var tot='';if(ls&&ls.teams&&ls.teams[side]){var ts=ls.teams[side];if(lb==='RUNS')tot=ts.runs||0;if(lb==='HITS')tot=ts.hits||0;if(lb==='ERRORS')tot=ts.errors||0;}
h+='<td colspan="'+sc.length+'" style="text-align:center;font-size:14px;font-weight:bold" class="'+rc+'">'+tot+'</td></tr>';
});
// Running
h+='<tr><td colspan="2" style="text-align:right;padding:3px 8px;font-size:10px;font-weight:bold;color:#555">RUNNING</td>';
var rt=0;for(var inn=1;inn<=ti;inn++){var rv='';if(ls&&ls.innings&&ls.innings[inn-1]){var sd2=side==='away'?ls.innings[inn-1].away:ls.innings[inn-1].home;if(sd2&&sd2.runs!=null){rt+=sd2.runs;rv=rt;}}h+='<td style="text-align:center;font-size:10px;font-weight:bold;color:#555;height:20px">'+rv+'</td>';}
h+='<td colspan="'+sc.length+'"></td></tr></tbody></table>';
// Bottom
h+='<div class="bottom">';
var psc=['IP','BF','H','R','ER','BB','K','HR','PC','WP','BK'];
h+='<table class="pit-table"><thead><tr><th style="width:24px">#</th><th style="width:130px;text-align:left">'+gd.teams[opp].abbreviation+' PITCHER</th>';
psc.forEach(function(c){h+='<th style="width:26px;font-size:9px">'+c+'</th>'});
h+='</tr></thead><tbody>';
var prows=opIds.map(function(pid){var pd=opl['ID'+pid]||{};var ps=pd.stats&&pd.stats.pitching||{};return{num:pd.jerseyNumber||'',name:pd.person&&pd.person.fullName||'',ip:ps.inningsPitched||'',bf:ps.battersFaced||'',h:ps.hits||'',r:ps.runs||'',er:ps.earnedRuns||'',bb:ps.baseOnBalls||'',k:ps.strikeOuts||'',hr:ps.homeRuns||'',pc:ps.numberOfPitches||'',wp:ps.wildPitches||'',bk:ps.balks||''}});
var mr=Math.max(prows.length,6);
for(var pi=0;pi<mr;pi++){var pr=prows[pi];h+='<tr><td style="text-align:center;font-size:10px">'+(pr?pr.num:(pi+1))+'</td><td style="width:130px;text-align:left;padding:0 4px;font-weight:bold;font-size:10px">'+(pr?pr.name:'')+'</td>';psc.forEach(function(c){h+='<td style="width:26px">'+(pr?pr[c.toLowerCase()]||'':'')+'</td>'});h+='</tr>';}
h+='</tbody></table>';
// Catcher — find catchers who played for the batting team
var catchers=[];
for(var ck in pl){var cp=pl[ck];if(cp.position&&cp.position.abbreviation==='C'&&cp.stats&&cp.stats.fielding&&cp.stats.fielding.gamesStarted>0){catchers.push({num:cp.jerseyNumber||'',name:cp.person&&cp.person.fullName||'',pb:cp.stats.fielding.passedBall||0,cs:cp.stats.fielding.caughtStealing||0,sb:cp.stats.fielding.stolenBases||0});}}
h+='<table class="cat-table"><thead><tr><th style="width:24px">#</th><th style="width:100px;text-align:left">CATCHER</th><th style="width:30px;font-size:10px">PB</th><th style="width:30px;font-size:10px">CS</th><th style="width:30px;font-size:10px">SB</th></tr></thead><tbody>';
var mcr=Math.max(catchers.length,2);
for(var ci=0;ci<mcr;ci++){var cc=catchers[ci];h+='<tr><td style="text-align:center;font-size:10px">'+(cc?cc.num:'')+'</td><td style="text-align:left;padding:0 4px;font-weight:bold;font-size:10px">'+(cc?cc.name:'')+'</td><td>'+(cc?cc.pb:'')+'</td><td>'+(cc?cc.cs:'')+'</td><td>'+(cc?cc.sb:'')+'</td></tr>';}
h+='</tbody></table>';
h+='</div>';
// Game notes with W/L/S
var dec=ld.decisions||{};
var wPitch=dec.winner?dec.winner.fullName:'\u2014';
var lPitch=dec.loser?dec.loser.fullName:'\u2014';
var sPitch=dec.save?dec.save.fullName:'\u2014';
h+='<div class="game-notes"><b>W:</b> '+wPitch+' \u00B7 <b>L:</b> '+lPitch+' \u00B7 <b>S:</b> '+sPitch+' \u00B7 <b>Venue:</b> '+venue+'</div>';
document.getElementById('content').innerHTML=h;
}
fetchGame();
</script>
