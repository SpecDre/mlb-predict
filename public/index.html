<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLB Predict</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5F3EE;--sf:#FFF;--sf2:#E4E7EB;--tx:#1A1A18;--tx2:#5A6170;--tx3:#8B909A;--acc:#BA7517;--accL:#FAEEDA;--grn:#4A8C1C;--grnB:#EAF3DE;--red:#C43028;--redB:#FCEBEB;--blu:#2A6CB6;--bluB:#E6F1FB;--pur:#6B5BC0;--purB:#EEEDFE;--teal:#0F6E56;--tealB:#E1F5EE;--brd:rgba(0,0,0,.08);--r:10px;--rl:14px}
@media(prefers-color-scheme:dark){:root{--bg:#1A1918;--sf:#252422;--sf2:#2E3138;--tx:#E8E5DD;--tx2:#9CA3AF;--tx3:#6B7280;--acc:#EF9F27;--accL:#412402;--grn:#97C459;--grnB:#1E2E0D;--red:#F09595;--redB:#3A1616;--blu:#85B7EB;--bluB:#122540;--pur:#AFA9EC;--purB:#26215C;--teal:#5DCAA5;--tealB:#04342C;--brd:rgba(255,255,255,.08)}
.gc-hd{background:#3A5568}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.app{max-width:880px;margin:0 auto;padding:20px 16px 100px}
h1{font-family:'Playfair Display',serif;font-weight:900;font-size:26px;letter-spacing:-.5px}
.hdr{margin-bottom:20px}.hdr-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:4px}
.logo{display:flex;align-items:center;gap:10px}
.logo-m{width:40px;height:40px;border-radius:10px;background:var(--acc);display:flex;align-items:center;justify-content:center}
.logo-m svg{width:22px;height:22px}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--red);display:inline-block;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sub-h{font-size:14px;color:var(--tx2);line-height:1.5}
.date-nav{display:flex;align-items:center;gap:8px;margin:14px 0;justify-content:center}
.date-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--brd);background:var(--sf);color:var(--tx);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px}
.date-main{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;text-align:center;min-width:200px}
.date-sub{font-size:11px;color:var(--tx3);text-align:center;margin-top:2px}
.modes{display:flex;gap:4px;background:var(--sf2);border-radius:var(--r);padding:4px;margin-bottom:16px}
.mbtn{flex:1;padding:10px 6px;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;background:transparent;color:var(--tx2);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}
.mbtn.act{background:var(--sf);color:var(--tx);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.mbdg{font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px}
.bdg-g{background:var(--tealB);color:var(--teal)}.bdg-hr{background:var(--redB);color:var(--red)}.bdg-h{background:var(--bluB);color:var(--blu)}
.ld{text-align:center;padding:60px 20px;color:var(--tx2)}
.sp{width:36px;height:36px;border:3px solid var(--brd);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Game card */
.gc{background:var(--sf);border-radius:var(--rl);border:1px solid var(--brd);margin-bottom:14px;overflow:hidden}
.gc-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#4A6D8C;border-bottom:none;flex-wrap:wrap;gap:6px}
.gc-hd .tm{color:#FFF}
.gc-hd .vs_{color:#B8D0E2}
.tm{font-size:15px;font-weight:700}.vs_{font-size:11px;color:var(--tx3)}

/* Status badges */
.st-badge{font-size:10px;font-weight:700;padding:4px 10px;border-radius:6px;text-transform:uppercase;letter-spacing:.5px}
.st-live{background:rgba(196,48,40,0.9);color:#FFF}
.st-final{background:rgba(255,255,255,0.2);color:#FFF}
.st-pre{background:rgba(255,255,255,0.2);color:#FFF}

/* Prediction result badge */
.pred-result{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:4px 10px;border-radius:6px;margin-left:6px}
.pred-correct{background:rgba(74,140,28,0.85);color:#FFF}
.pred-wrong{background:rgba(196,48,40,0.85);color:#FFF}

/* Live scoreboard */
.live-board{padding:12px 16px;border-bottom:1px solid var(--brd);background:var(--sf)}
.live-teams{display:flex;flex-direction:column;gap:4px}
.live-team-row{display:flex;align-items:center;gap:10px;font-size:13px}
.live-team-row.batting{font-weight:700}
.lt-name{width:40px;font-weight:700;font-size:14px}
.lt-innings{display:flex;gap:0;flex:1}
.lt-inn{width:24px;text-align:center;font-size:11px;padding:3px 0;color:var(--tx2)}
.lt-inn.hdr{font-weight:600;color:var(--tx3);font-size:10px}
.lt-rhe{display:flex;gap:0}
.lt-rhe-val{width:28px;text-align:center;font-size:13px;font-weight:700;padding:3px 0}
.lt-rhe-val.hdr{font-weight:600;color:var(--tx3);font-size:10px;font-weight:600}
.live-situation{display:flex;align-items:center;gap:14px;margin-top:8px;padding-top:8px;border-top:1px solid var(--brd)}
.live-count{font-size:11px;color:var(--tx2)}
.live-count b{color:var(--tx);font-size:12px}
.live-outs{display:flex;gap:3px}
.live-out{width:10px;height:10px;border-radius:50%;border:1.5px solid var(--tx3)}
.live-out.filled{background:var(--acc);border-color:var(--acc)}
/* Diamond */
.diamond-wrap{position:relative;width:36px;height:36px}
.diamond-base{position:absolute;width:9px;height:9px;border:1.5px solid var(--tx3);transform:rotate(45deg);background:transparent}
.diamond-base.on{background:var(--acc);border-color:var(--acc)}
.diamond-base.b1{right:0;top:50%;margin-top:-5px}
.diamond-base.b2{left:50%;top:0;margin-left:-5px}
.diamond-base.b3{left:0;top:50%;margin-top:-5px}

/* Final score display */
.final-score{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--brd)}
.final-tm{display:flex;align-items:center;gap:10px}
.final-abbr{font-size:18px;font-weight:900;font-family:'Playfair Display',serif}
.final-abbr.winner{color:var(--grn)}
.final-abbr.loser{color:var(--tx3)}
.final-runs{font-size:28px;font-weight:900;font-family:'Playfair Display',serif}
.final-runs.winner{color:var(--tx)}
.final-runs.loser{color:var(--tx3)}
.final-vs{font-size:11px;color:var(--tx3);padding:0 10px}
.final-tag{font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px;margin-left:6px}
.tag-w{background:var(--grnB);color:var(--grn)}
.tag-l{background:var(--redB);color:var(--red)}

/* Win prob display */
.wp-row{display:flex;align-items:stretch}
.wp-tm{flex:1;padding:14px;display:flex;flex-direction:column;align-items:center;gap:3px}
.wp-tm.fav{background:var(--grnB)}
.wp-abbr{font-size:24px;font-weight:900;font-family:'Playfair Display',serif}
.wp-rec{font-size:11px;color:var(--tx3)}
.wp-pct{font-size:28px;font-weight:900;font-family:'Playfair Display',serif}
.wp-pct.hi{color:var(--grn)}.wp-pct.lo{color:var(--tx3)}
.wp-lbl{font-size:9px;color:var(--tx3);text-transform:uppercase}
.wp-vs{display:flex;align-items:center;justify-content:center;width:40px;font-size:11px;color:var(--tx3);font-weight:600}
.wp-bar{padding:0 16px 10px;display:flex;gap:2px}
.wp-bar>div{height:8px;border-radius:4px}
.gc-pit{display:flex;justify-content:space-between;padding:8px 16px;border-top:1px solid var(--brd);font-size:12px;color:var(--tx2)}
.gc-verdict{margin:4px 16px 12px;padding:8px 12px;border-radius:8px;font-size:12px;line-height:1.5;border-left:3px solid var(--acc);background:var(--sf2);color:var(--tx2)}

/* Batter row */
.slb{padding:6px 16px 3px;font-size:10px;color:var(--tx3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;border-top:1px solid var(--brd)}
.br{display:flex;align-items:center;padding:8px 16px;gap:8px;cursor:pointer}
.br:hover{background:var(--sf2)}
.brk{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.rk-f{background:var(--grnB);color:var(--grn)}.rk-h{background:var(--tealB);color:var(--teal)}.rk-o{background:var(--sf2);color:var(--tx2)}.rk-c{background:var(--redB);color:var(--red)}
.bi{flex:1;min-width:0}.bn{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bm{font-size:11px;color:var(--tx3)}
.bp{text-align:right;flex-shrink:0}.bpc{font-size:17px;font-weight:700}
.bpc.tf{color:var(--grn)}.bpc.th{color:var(--teal)}.bpc.to{color:var(--tx2)}.bpc.tc{color:var(--red)}
.bpl{font-size:8px;color:var(--tx3);text-transform:uppercase}
.bd{display:none;padding:2px 16px 10px 48px}.bd.open{display:block}
.dg{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:4px}
.di{background:var(--sf2);border-radius:6px;padding:4px 8px}
.dl{font-size:9px;color:var(--tx3);text-transform:uppercase}.dv{font-size:13px;font-weight:600}
.h2h-b{margin-top:6px;padding:6px 8px;border-radius:6px;font-size:11px;border-left:3px solid var(--pur);background:var(--purB);color:var(--pur)}

/* Leaderboard */
.lbc{background:var(--sf);border-radius:var(--rl);border:1px solid var(--brd);overflow:hidden}
.lbr{display:flex;align-items:center;padding:10px 16px;gap:10px;border-bottom:1px solid var(--brd)}
.lbr:last-child{border-bottom:none}
.lbn{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;color:var(--tx3);width:26px;text-align:center}
.lbn.t3{color:var(--acc)}
.lbi{flex:1;min-width:0}.lbna{font-size:14px;font-weight:600}
.lbsu{font-size:11px;color:var(--tx3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lbpv{font-size:18px;font-weight:700;text-align:right}
.stabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.stab{padding:6px 14px;border:1px solid var(--brd);border-radius:20px;font-size:12px;font-weight:500;background:var(--sf);color:var(--tx2);cursor:pointer}
.stab.act{background:var(--tx);color:var(--bg);border-color:var(--tx)}
.empty{text-align:center;padding:50px 20px}.empty h3{font-size:16px;margin-bottom:6px}.empty p{font-size:13px;color:var(--tx2)}
.refresh-bar{text-align:center;font-size:11px;color:var(--tx3);padding:6px 0}

/* Record tracker */
.record-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:10px;margin-bottom:14px;background:var(--sf);border-radius:var(--r);border:1px solid var(--brd);font-size:13px;flex-wrap:wrap}

/* Compact score for HR/Hits tabs */
.compact-score{padding:8px 16px;font-size:12px;color:var(--tx2);display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--brd)}
.compact-score .cs-final{font-weight:700;color:var(--tx3);text-transform:uppercase;font-size:10px;letter-spacing:.5px}
.compact-score .cs-scores{font-weight:700;color:var(--tx)}
.compact-score .cs-live{color:var(--red);font-weight:700}

/* Tier labels */
.tier-label{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;padding:1px 5px;border-radius:3px;margin-top:1px}
.tier-fire{background:var(--grnB);color:var(--grn)}
.tier-warm{background:var(--tealB);color:var(--teal)}
.tier-mild{background:var(--sf2);color:var(--tx2)}
.tier-cold{background:var(--redB);color:var(--red)}

/* Game result line on batter */
.game-line{font-size:11px;font-weight:600;margin-top:1px}
.gl-hr{color:var(--red)}
.gl-hit{color:var(--grn)}
.gl-out{color:var(--tx3)}
.gl-pending{color:var(--tx3);font-weight:400;font-style:italic}

/* HR result badge */
.hr-badge{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px}
.hr-yes{background:var(--redB);color:var(--red)}
.hr-no{background:var(--sf2);color:var(--tx3)}
.hit-yes{background:var(--grnB);color:var(--grn)}
.hit-no{background:var(--sf2);color:var(--tx3)}
.rec-item{display:flex;align-items:center;gap:4px;font-weight:600}
.rec-item.correct{color:var(--grn)}.rec-item.wrong{color:var(--red)}.rec-item.pending{color:var(--tx3)}

/* Inning-by-inning scoreboard */
.inn-board{margin-bottom:6px}
.inn-table{width:100%;border-collapse:collapse;font-size:12px;font-family:'DM Sans',sans-serif}
.inn-table th,.inn-table td{text-align:center;padding:4px 0;min-width:22px}
.inn-table th{font-size:10px;color:var(--tx3);font-weight:600}
.inn-table .tm-cell{text-align:left;font-weight:700;font-size:13px;padding-left:4px;width:44px}
.inn-table .rhe-hdr{font-weight:700;color:var(--tx);min-width:28px}
.inn-table .rhe-val{font-weight:700;min-width:28px}
.inn-table .winner-row .rhe-val:first-of-type{color:var(--grn)}

/* Current matchup */
.matchup-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--sf2);border-bottom:1px solid var(--brd);gap:8px;flex-wrap:wrap}
.mu-side{display:flex;flex-direction:column;gap:2px;max-width:45%}
.mu-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mu-stat{font-size:10px;color:var(--tx2)}
.mu-today{font-size:10px;color:var(--acc);font-weight:600}
.mu-vs{font-size:10px;color:var(--tx3);font-weight:600;flex-shrink:0}

/* Last play */
.last-play{padding:8px 16px;font-size:12px;color:var(--tx2);border-bottom:1px solid var(--brd);line-height:1.5}
.last-play b{color:var(--tx)}
.lp-inn{font-size:9px;font-weight:700;color:var(--tx3);text-transform:uppercase;margin-right:6px}

/* Win prob shift */
.wp-shift{display:flex;align-items:center;gap:8px;padding:8px 16px;font-size:11px;color:var(--tx2);border-bottom:1px solid var(--brd)}
.wp-shift-arrow{font-size:14px;font-weight:700}
.wp-shift-arrow.up{color:var(--grn)}
.wp-shift-arrow.down{color:var(--red)}

/* Scoring plays */
.sp-section{border-top:1px solid var(--brd)}
.sp-toggle{padding:8px 16px;font-size:11px;font-weight:600;color:var(--acc);cursor:pointer;display:flex;align-items:center;gap:4px}
.sp-toggle:hover{background:var(--sf2)}
.sp-list{display:none;padding:0 16px 8px}
.sp-list.open{display:block}
.sp-item{padding:6px 0;border-bottom:1px solid var(--brd);font-size:11px;line-height:1.5}
.sp-item:last-child{border-bottom:none}
.sp-inn{font-size:9px;font-weight:700;color:var(--tx3);text-transform:uppercase;display:inline-block;width:40px}
.sp-score{font-size:10px;font-weight:700;color:var(--tx);margin-left:4px}

/* Pitch count */
.pc-bar{display:flex;justify-content:space-between;padding:6px 16px;font-size:10px;color:var(--tx3);border-top:1px solid var(--brd)}

/* ===== v2 new styles ===== */

/* Pitcher hand badge */
.hand-badge{display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;width:16px;height:16px;border-radius:50%;margin-left:3px;vertical-align:middle}
.hand-L{background:var(--redB);color:var(--red)}
.hand-R{background:var(--bluB);color:var(--blu)}

/* Pythagorean row */
.pyth-row{display:flex;justify-content:space-between;padding:4px 16px;font-size:10px;color:var(--tx3);border-top:1px solid var(--brd)}
.pyth-val{font-weight:600}

/* Platoon detail */
.platoon-b{margin-top:6px;padding:6px 8px;border-radius:6px;font-size:11px;border-left:3px solid var(--teal);background:var(--tealB);color:var(--teal)}

/* Statcast detail */
.sc-b{margin-top:6px;padding:6px 8px;border-radius:6px;font-size:11px;border-left:3px solid var(--blu);background:var(--bluB);color:var(--blu)}

/* Weather badge */
.wx-row{display:flex;align-items:center;gap:6px;padding:4px 16px;font-size:10px;color:var(--tx3);border-top:1px solid var(--brd)}
.wx-badge{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px}
.wx-hot{background:var(--redB);color:var(--red)}
.wx-cold{background:var(--bluB);color:var(--blu)}
.wx-neutral{background:var(--sf2);color:var(--tx3)}
.wx-wind-out{background:var(--grnB);color:var(--grn)}
.wx-wind-in{background:var(--purB);color:var(--pur)}

/* Lineup position badge */
.lo-badge{display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;width:14px;height:14px;border-radius:3px;margin-left:3px;vertical-align:middle;background:var(--sf2);color:var(--tx3)}
.lo-top{background:var(--accL);color:var(--acc)}

/* Drought tags */
.drought-tag{display:inline-flex;align-items:center;gap:3px;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;padding:2px 7px;border-radius:4px;margin-left:4px;vertical-align:middle}
.tag-dinger{background:#FFF3E0;color:#E65100;border:1px solid #FFB74D}
@media(prefers-color-scheme:dark){.tag-dinger{background:#3E2700;color:#FFB74D;border-color:#6D4C00}}
.tag-slump{background:var(--sf2);color:var(--tx3);border:1px solid var(--brd)}

/* Model version badge */
.model-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;background:var(--accL);color:var(--acc);cursor:default}
.model-info{display:none;position:absolute;top:100%;right:0;background:var(--sf);border:1px solid var(--brd);border-radius:8px;padding:10px;font-size:11px;color:var(--tx2);width:220px;box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:10}
.model-wrap{position:relative;display:inline-block}
.model-wrap:hover .model-info{display:block}
.mi-row{display:flex;justify-content:space-between;padding:2px 0}
.mi-on{color:var(--grn);font-weight:600}
.mi-off{color:var(--tx3)}

/* 30-day accuracy bar */
.acc-30{display:flex;align-items:center;gap:8px;padding:8px 12px;margin-bottom:14px;background:var(--sf);border-radius:var(--r);border:1px solid var(--brd);font-size:12px;flex-wrap:wrap}
.acc-30 .a30-lbl{font-weight:700;color:var(--tx)}
.acc-30 .a30-val{font-weight:700}
.acc-30 .a30-good{color:var(--grn)}
.acc-30 .a30-ok{color:var(--acc)}
.acc-30 .a30-bad{color:var(--red)}
.acc-30 .a30-bar{flex:1;min-width:100px;height:6px;border-radius:3px;background:var(--sf2);overflow:hidden}
.acc-30 .a30-fill{height:100%;border-radius:3px;background:var(--grn)}

@media(max-width:600px){.wp-abbr{font-size:18px}.wp-pct{font-size:22px}.wp-tm{padding:10px 8px}.wp-vs{width:30px;font-size:10px}h1{font-size:22px}.lt-inn{width:20px;font-size:10px}.lt-rhe-val{width:24px;font-size:12px}.inn-board{overflow-x:auto}.acc-30{font-size:11px}}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-top">
      <div class="logo">
        <div class="logo-m"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M3.5 12C6 12 8 9 8 6.5M3.5 12C6 12 8 15 8 17.5M20.5 12C18 12 16 9 16 6.5M20.5 12C18 12 16 15 16 17.5"/></svg></div>
        <h1>MLB Predict</h1>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div id="liveInd" style="display:none"><span class="live-dot"></span> <span style="font-size:12px;color:var(--red);font-weight:600">LIVE</span></div>
        <div class="model-wrap"><span class="model-badge" id="modelBadge">v3</span>
          <div class="model-info" id="modelInfo">
            <div style="font-weight:700;margin-bottom:4px;color:var(--tx)">Model v3</div>
            <div class="mi-row"><span>Pythagorean W%</span><span class="mi-on" id="mi-pyth">&#10003;</span></div>
            <div class="mi-row"><span>Platoon splits</span><span class="mi-on" id="mi-plat">&#10003;</span></div>
            <div class="mi-row"><span>Statcast</span><span id="mi-sc">-</span></div>
            <div class="mi-row"><span>Weather</span><span class="mi-on" id="mi-wx">&#10003;</span></div>
            <div class="mi-row"><span>Fly ball rate</span><span class="mi-on" id="mi-fb">&#10003;</span></div>
            <div class="mi-row"><span>Bullpen HR/9</span><span class="mi-on" id="mi-bp">&#10003;</span></div>
            <div class="mi-row"><span>Lineup position</span><span class="mi-on" id="mi-lo">&#10003;</span></div>
            <div class="mi-row"><span>Calibrated</span><span class="mi-on" id="mi-cal">&#10003;</span></div>
          </div>
        </div>
      </div>
    </div>
    <p class="sub-h">Game picks, HR &amp; hit probabilities — Pythagorean + platoon + Statcast + weather engine</p>
  </div>
  <div class="date-nav">
    <button class="date-btn" onclick="changeDate(-1)">&#8249;</button>
    <div><div class="date-main" id="dateMain">Loading...</div><div class="date-sub" id="dateSub"></div></div>
    <button class="date-btn" onclick="changeDate(1)">&#8250;</button>
  </div>
  <div id="acc30Bar"></div>
  <div id="recordBar"></div>
  <div class="modes">
    <button class="mbtn act" data-m="game" onclick="setMode('game')">&#9917; Games <span class="mbdg bdg-g" id="bg">-</span></button>
    <button class="mbtn" data-m="hr" onclick="setMode('hr')">&#128165; HR <span class="mbdg bdg-hr" id="bhr">-</span></button>
    <button class="mbtn" data-m="hit" onclick="setMode('hit')">&#127951; Hits <span class="mbdg bdg-h" id="bht">-</span></button>
  </div>
  <div class="stabs">
    <button class="stab act" data-s="main" onclick="setSub('main')">By game</button>
    <button class="stab" data-s="lb" onclick="setSub('lb')">Leaderboard</button>
  </div>
  <div id="refreshBar" class="refresh-bar" style="display:none">Live scores updating every 10s</div>
  <div id="out"></div>
</div>
<script>
var mode='game',sub_='main',currentDate=new Date(),data=null,liveScores={},refreshTimer=null;
var dateStr=function(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')};
var fTime=function(iso){if(!iso)return'';return new Date(iso).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})};

// ===== 30-Day Accuracy Tracker (localStorage) =====
var ACC_KEY='mlbpredict_accuracy';

function loadAccuracy(){
  try{var raw=localStorage.getItem(ACC_KEY);return raw?JSON.parse(raw):{};}catch(e){return{};}
}
function saveAccuracy(acc){
  try{localStorage.setItem(ACC_KEY,JSON.stringify(acc));}catch(e){}
}
function recordDayResults(dateKey,results){
  var acc=loadAccuracy();
  acc[dateKey]=results;
  // Prune entries older than 45 days
  var cutoff=new Date();cutoff.setDate(cutoff.getDate()-45);
  var cutStr=dateStr(cutoff);
  for(var k in acc){if(k<cutStr)delete acc[k];}
  saveAccuracy(acc);
}
function get30DayAccuracy(){
  var acc=loadAccuracy();
  var cutoff=new Date();cutoff.setDate(cutoff.getDate()-30);
  var cutStr=dateStr(cutoff);
  var c=0,w=0;
  for(var k in acc){
    if(k>=cutStr){c+=acc[k].correct||0;w+=acc[k].wrong||0;}
  }
  return{correct:c,wrong:w,total:c+w,pct:c+w>0?Math.round(c/(c+w)*100):0,days:Object.keys(acc).filter(function(k){return k>=cutStr}).length};
}
function render30DayBar(){
  var a=get30DayAccuracy();
  var el=document.getElementById('acc30Bar');
  if(a.total<3){el.innerHTML='';return;}
  var cls=a.pct>=60?'a30-good':a.pct>=50?'a30-ok':'a30-bad';
  el.innerHTML='<div class="acc-30">'
    +'<span class="a30-lbl">30-Day</span>'
    +'<span class="a30-val '+cls+'">'+a.correct+'-'+a.wrong+' ('+a.pct+'%)</span>'
    +'<div class="a30-bar"><div class="a30-fill" style="width:'+a.pct+'%;background:'+(a.pct>=60?'var(--grn)':a.pct>=50?'var(--acc)':'var(--red)')+'"></div></div>'
    +'<span style="font-size:10px;color:var(--tx3)">'+a.days+' days &middot; '+a.total+' games</span>'
    +'</div>';
}
function tryRecordAccuracy(){
  // Check if current date has all final results, record them
  if(!data||!data.gamePreds)return;
  var dk=dateStr(currentDate);
  var correct=0,wrong=0,pending=0;
  data.gamePreds.forEach(function(gp){
    var live=getLiveData(gp.gamePk);
    if(!live||live.status!=='Final'){pending++;return;}
    if(live.awayScore===0&&live.homeScore===0&&(live.awayHits||0)===0&&(live.homeHits||0)===0)return;
    var predicted=gp.pred.aProb>=50?gp.away:gp.home;
    var actual=live.awayScore>live.homeScore?gp.away:live.homeScore>live.awayScore?gp.home:'TIE';
    if(actual==='TIE')return; // spring training ties — don't count
    if(predicted===actual)correct++;else wrong++;
  });
  if(correct+wrong>0){
    recordDayResults(dk,{correct:correct,wrong:wrong});
    render30DayBar();
  }
}

// ===== Core UI =====
function updateDateUI(){
  var d=currentDate;
  document.getElementById('dateMain').textContent=d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  var today=new Date();var diff=Math.round((d-today)/(864e5));
  document.getElementById('dateSub').textContent=diff===0?'Today':diff===1?'Tomorrow':diff===-1?'Yesterday':diff>0?diff+' days ahead':Math.abs(diff)+' days ago';
}
function changeDate(delta){currentDate=new Date(currentDate.getTime()+delta*864e5);updateDateUI();loadData()}
function setMode(m){mode=m;document.querySelectorAll('.mbtn').forEach(function(b){b.classList.toggle('act',b.dataset.m===m)});render()}
function setSub(s){sub_=s;document.querySelectorAll('.stab').forEach(function(b){b.classList.toggle('act',b.dataset.s===s)});render()}

function hrT(p){p=+p;return p>=12?'f':p>=7?'h':p>=4?'o':'c'}
function hitT(p){p=+p;return p>=78?'f':p>=72?'h':p>=65?'o':'c'}
function tCls(t){return'rk-'+t}
function tCol(t){return t==='f'?'var(--grn)':t==='h'?'var(--teal)':t==='o'?'var(--tx2)':'var(--red)'}

function getLiveData(gamePk){return liveScores[gamePk]||null}

// Live win probability based on score, inning, outs
function calcLiveWP(preAwayProb, awayScore, homeScore, inning, isTopInning, outs) {
  if (!inning || inning < 1) return { away: preAwayProb, home: 100 - preAwayProb };
  
  // Innings remaining (fractional based on half-inning and outs)
  var halfInningsLeft = (9 - inning) * 2;
  if (isTopInning) halfInningsLeft += 1; // haven't finished this half yet
  halfInningsLeft += (3 - (outs || 0)) / 3; // partial outs in current half-inning
  halfInningsLeft = Math.max(halfInningsLeft, 0.1);
  var inningsLeft = halfInningsLeft / 2;
  
  // Run differential from away team perspective (positive = away leading)
  var runDiff = awayScore - homeScore;
  
  // Score-based win probability using sigmoid scaled by innings remaining
  // More innings left = less certain, fewer innings = more decisive
  var k = 1.4; // calibration constant
  var z = runDiff * k / Math.sqrt(Math.max(inningsLeft, 0.3));
  var scoreWP = 1 / (1 + Math.exp(-z)); // away team win prob from score alone
  
  // Home team advantage when tied or close (they bat last)
  if (Math.abs(runDiff) <= 1 && !isTopInning) scoreWP -= 0.03;
  
  // Blend: early innings lean on pre-game, late innings lean on score
  var leverage = Math.min(1, 1 - (inningsLeft / 9));
  leverage = Math.max(0.15, leverage); // even in 1st inning, score matters a little
  
  var preAway = preAwayProb / 100;
  var liveAway = scoreWP * leverage + preAway * (1 - leverage);
  
  // Clamp
  liveAway = Math.max(0.02, Math.min(0.98, liveAway));
  
  return {
    away: Math.round(liveAway * 100),
    home: Math.round((1 - liveAway) * 100)
  };
}

function handBadge(h){
  if(!h||h==='?')return'';
  return '<span class="hand-badge hand-'+h+'">'+h+'</span>';
}

function renderLinescore(live, gp){
  if(!live)return'';
  var isLive=live.status==='Live';
  var isFinal=live.status==='Final';
  if(!isLive&&!isFinal)return'';

  var awayWon=isFinal&&live.awayScore>live.homeScore;
  var homeWon=isFinal&&live.homeScore>live.awayScore;
  var innings=live.innings||[];
  var maxInn=Math.max(innings.length,9);

  var hdr='<tr><th class="tm-cell"></th>';
  var aRow='<tr class="'+(awayWon?'winner-row':'')+'"><td class="tm-cell" style="'+(awayWon?'color:var(--grn)':homeWon?'color:var(--tx3)':'')+'">'+gp.away+'</td>';
  var hRow='<tr class="'+(homeWon?'winner-row':'')+'"><td class="tm-cell" style="'+(homeWon?'color:var(--grn)':awayWon?'color:var(--tx3)':'')+'">'+gp.home+'</td>';
  for(var i=0;i<maxInn;i++){
    hdr+='<th>'+(i+1)+'</th>';
    var inn=innings[i];
    aRow+='<td>'+(inn&&inn.away!=null?inn.away:'-')+'</td>';
    hRow+='<td>'+(inn&&inn.home!=null?inn.home:'-')+'</td>';
  }
  hdr+='<th class="rhe-hdr">R</th><th class="rhe-hdr">H</th><th class="rhe-hdr">E</th></tr>';
  aRow+='<td class="rhe-val" style="'+(awayWon?'color:var(--grn)':'')+'">'+live.awayScore+'</td><td class="rhe-val">'+(live.awayHits||0)+'</td><td class="rhe-val">'+(live.awayErrors||0)+'</td></tr>';
  hRow+='<td class="rhe-val" style="'+(homeWon?'color:var(--grn)':'')+'">'+live.homeScore+'</td><td class="rhe-val">'+(live.homeHits||0)+'</td><td class="rhe-val">'+(live.homeErrors||0)+'</td></tr>';
  var boardHTML='<div class="live-board"><div class="inn-board"><table class="inn-table">'+hdr+aRow+hRow+'</table></div>';

  if(isLive){
    var outs=live.outs||0;
    boardHTML+='<div class="live-situation">'
      +'<div class="diamond-wrap">'
      +'<div class="diamond-base b1'+(live.runnerOn1?' on':'')+'"></div>'
      +'<div class="diamond-base b2'+(live.runnerOn2?' on':'')+'"></div>'
      +'<div class="diamond-base b3'+(live.runnerOn3?' on':'')+'"></div>'
      +'</div>'
      +'<div class="live-count"><b>'+(live.isTopInning?'Top':'Bot')+' '+live.inning+'</b></div>'
      +'<div class="live-outs">'
      +'<div class="live-out'+(outs>=1?' filled':'')+'"></div>'
      +'<div class="live-out'+(outs>=2?' filled':'')+'"></div>'
      +'</div>'
      +'</div>';
  }
  boardHTML+='</div>';

  var matchupHTML='';
  if(isLive&&(live.currentBatter||live.currentPitcher)){
    var cb=live.currentBatter||{};
    var cp=live.currentPitcher||{};
    matchupHTML='<div class="matchup-bar">';
    if(cb.name){
      matchupHTML+='<div class="mu-side"><div style="font-size:9px;color:var(--tx3);text-transform:uppercase;font-weight:600">At Bat</div>'
        +'<div class="mu-name">'+cb.name+'</div>'
        +'<div class="mu-stat">'+(cb.avg||'-')+' AVG &middot; '+(cb.hr||0)+' HR &middot; '+(cb.ops||'-')+' OPS</div>'
        +(cb.todayAB!=null?'<div class="mu-today">Today: '+cb.todayH+'-'+cb.todayAB+(cb.todayHR>0?', '+cb.todayHR+' HR':'')+'</div>':'')
        +'</div>';
    }
    matchupHTML+='<div class="mu-vs">vs</div>';
    if(cp.name){
      matchupHTML+='<div class="mu-side" style="text-align:right;align-items:flex-end">'
        +'<div style="font-size:9px;color:var(--tx3);text-transform:uppercase;font-weight:600">Pitching</div>'
        +'<div class="mu-name">'+cp.name+'</div>'
        +'<div class="mu-stat">'+(cp.era||'-')+' ERA &middot; '+(cp.wins||0)+'W-'+(cp.losses||0)+'L</div>'
        +(cp.todayIP!=null?'<div class="mu-today">Today: '+cp.todayIP+'IP, '+cp.todayK+'K, '+cp.todayR+'R, '+(cp.todayPC||0)+'P</div>':'')
        +'</div>';
    }
    matchupHTML+='</div>';
  }

  var lastPlayHTML='';
  if(live.lastPlay&&live.lastPlay.desc){
    lastPlayHTML='<div class="last-play"><span class="lp-inn">'+live.lastPlay.inning+'</span><b>'+(live.lastPlay.event||'')+'</b> '+live.lastPlay.desc+'</div>';
  }

  // Live WP shift display removed — now handled by calcLiveWP in the main game card

  var pcHTML='';
  if((isLive||isFinal)&&(live.awayPitchCount>0||live.homePitchCount>0)){
    pcHTML='<div class="pc-bar"><span>'+gp.away+' SP: '+(live.awayPitchCount||'-')+' pitches</span><span>'+gp.home+' SP: '+(live.homePitchCount||'-')+' pitches</span></div>';
  }

  var spHTML='';
  if(live.scoringPlays&&live.scoringPlays.length>0){
    var spid='sp'+gp.gamePk;
    var items=live.scoringPlays.map(function(sp){
      return'<div class="sp-item"><span class="sp-inn">'+sp.inning+'</span>'+sp.desc+'<span class="sp-score"> ('+sp.awayScore+'-'+sp.homeScore+')</span></div>';
    }).join('');
    spHTML='<div class="sp-section"><div class="sp-toggle" onclick="document.getElementById(\''+spid+'\').classList.toggle(\'open\')">&#9776; Scoring plays ('+live.scoringPlays.length+') &#9662;</div><div class="sp-list" id="'+spid+'">'+items+'</div></div>';
  }

  return boardHTML+matchupHTML+lastPlayHTML+pcHTML+spHTML;
}


function renderGameCard(gp){
  var p=gp.pred;var aWin=p.aProb>=50;
  var conf=Math.max(p.aProb,p.hProb);
  var live=getLiveData(gp.gamePk);
  var isLive=live&&live.status==='Live';
  var isFinal=live&&live.status==='Final';
  var isCancelled=isFinal&&live.awayScore===0&&live.homeScore===0&&(live.awayHits||0)===0&&(live.homeHits||0)===0;
  if(isCancelled)isFinal=false;
  var predictedWinner=aWin?gp.away:gp.home;

  var statusHTML='';
  if(isCancelled){
    statusHTML='<span class="st-badge st-final">Cancelled</span>';
  } else if(isLive){
    statusHTML='<span class="st-badge st-live"><span class="live-dot" style="width:6px;height:6px;margin-right:3px;vertical-align:middle"></span> '+(live.isTopInning?'Top':'Bot')+' '+live.inning+'</span>';
  } else if(isFinal){
    if(mode==='game'){
      var actualWinner=live.awayScore>live.homeScore?gp.away:live.homeScore>live.awayScore?gp.home:'TIE';
      var isTie=actualWinner==='TIE';
      var predCorrect=!isTie&&actualWinner===predictedWinner;
      statusHTML='<span class="st-badge st-final">Final</span>'
        +(isTie?'<span class="pred-result" style="color:#FFF;background:rgba(255,255,255,0.2)">TIE</span>'
        :'<span class="pred-result '+(predCorrect?'pred-correct':'pred-wrong')+'">'
        +(predCorrect?'&#10003; Correct':'&#10007; Wrong')+'</span>');
    } else {
      statusHTML='<span class="st-badge st-final">Final '+live.awayScore+'-'+live.homeScore+'</span>';
    }
  } else {
    statusHTML='<span class="st-badge st-pre">'+fTime(gp.gameDate)+'</span>';
  }

  var scoreSection='';
  if(isFinal&&mode==='game'){
    var awayWon=live.awayScore>live.homeScore;
    var homeWon=live.homeScore>live.awayScore;
    var gameTied=live.awayScore===live.homeScore;
    if(gameTied){
      scoreSection='<div class="final-score">'
        +'<div class="final-tm"><span class="final-abbr">'+gp.away+'</span><span class="final-tag" style="background:var(--tx3);color:#fff">T</span></div>'
        +'<div class="final-runs">'+live.awayScore+'</div>'
        +'<div class="final-vs">-</div>'
        +'<div class="final-runs">'+live.homeScore+'</div>'
        +'<div class="final-tm"><span class="final-tag" style="background:var(--tx3);color:#fff">T</span><span class="final-abbr">'+gp.home+'</span></div>'
        +'</div>';
    } else {
      scoreSection='<div class="final-score">'
        +'<div class="final-tm"><span class="final-abbr '+(awayWon?'winner':'loser')+'">'+gp.away+'</span>'+(awayWon?'<span class="final-tag tag-w">W</span>':'<span class="final-tag tag-l">L</span>')+'</div>'
        +'<div class="final-runs '+(awayWon?'winner':'loser')+'">'+live.awayScore+'</div>'
        +'<div class="final-vs">-</div>'
        +'<div class="final-runs '+(awayWon?'loser':'winner')+'">'+live.homeScore+'</div>'
        +'<div class="final-tm">'+(awayWon?'<span class="final-tag tag-l">L</span>':'<span class="final-tag tag-w">W</span>')+'<span class="final-abbr '+(awayWon?'loser':'winner')+'">'+gp.home+'</span></div>'
        +'</div>';
    }
  }

  var liveBoard=renderLinescore(live, gp);

  // Batters section (HR/Hits tabs)
  var batters=data?data.batters.filter(function(b){return b.gamePk===gp.gamePk}):[];
  var awayB=batters.filter(function(b){return b.side==='away'});
  var homeB=batters.filter(function(b){return b.side==='home'});
  var batterSection='';
  if(mode!=='game'&&(awayB.length||homeB.length)){
    var key=mode==='hr'?'hrPct':'hitPct';
    awayB.sort(function(a,b){return(+b[key])-(+a[key])});
    homeB.sort(function(a,b){return(+b[key])-(+a[key])});
    if(awayB.length){
      var awayOpp=awayB[0].oppP||'TBD';
      var awayH=awayB[0].oppPHand||'';
      batterSection+='<div class="slb">'+gp.away+' vs '+awayOpp+(awayH?' '+handBadge(awayH):'')+'</div>'+awayB.map(function(b,i){return renderBatter(b,i,mode,isFinal)}).join('');
    }
    if(homeB.length){
      var homeOpp=homeB[0].oppP||'TBD';
      var homeH=homeB[0].oppPHand||'';
      batterSection+='<div class="slb">'+gp.home+' vs '+homeOpp+(homeH?' '+handBadge(homeH):'')+'</div>'+homeB.map(function(b,i){return renderBatter(b,i,mode,isFinal)}).join('');
    }
  } else if(mode!=='game'&&!awayB.length){
    batterSection='<div style="padding:16px;text-align:center;font-size:12px;color:var(--tx3)">Lineups not yet available</div>';
  }

  // Pythagorean detail row (game mode)
  var pythHTML='';
  if(mode==='game'&&p.det&&p.det.aPyth){
    pythHTML='<div class="pyth-row">'
      +'<span>'+gp.away+' Pyth: <span class="pyth-val">'+p.det.aPyth+'%</span> ('+p.det.aRS+' RS / '+p.det.aRA+' RA)</span>'
      +'<span>'+gp.home+' Pyth: <span class="pyth-val">'+p.det.hPyth+'%</span> ('+p.det.hRS+' RS / '+p.det.hRA+' RA)</span>'
      +'</div>';
  }

  // Weather row (game mode)
  var wxHTML='';
  if(mode==='game'&&gp.weather&&gp.weather.temp){
    var wx=gp.weather;
    var t=parseInt(wx.temp)||72;
    var tCls=t>=80?'wx-hot':t<=60?'wx-cold':'wx-neutral';
    var wf=wx.factor?wx.factor.combined:1;
    var wfLabel=wf>1.03?'HR+':wf<0.97?'HR-':'';
    wxHTML='<div class="wx-row">'
      +'<span class="wx-badge '+tCls+'">'+wx.temp+'&deg;F</span>'
      +(wx.wind?'<span>'+wx.wind+'</span>':'')
      +(wx.condition?'<span>'+wx.condition+'</span>':'')
      +(wfLabel?'<span class="wx-badge '+(wf>1?'wx-wind-out':'wx-wind-in')+'">'+wfLabel+' &times;'+wf.toFixed(2)+'</span>':'')
      +'</div>';
  }

  // SP info with hand badges + fly ball rate
  var aFB=gp.awaySPFB?' <span style="font-size:9px;color:var(--tx3)">('+gp.awaySPFB+'% FB)</span>':'';
  var hFB=gp.homeSPFB?' <span style="font-size:9px;color:var(--tx3)">('+gp.homeSPFB+'% FB)</span>':'';
  var aSPDisplay=gp.awaySP+handBadge(gp.awaySPHand);
  var hSPDisplay=gp.homeSP+handBadge(gp.homeSPHand);

  // v3 win model detail row
  var v3HTML='';
  if(mode==='game'&&p.det&&p.det.aWHIP){
    v3HTML='<div style="padding:4px 16px 8px;font-size:10px;color:var(--tx3);display:flex;justify-content:space-between;border-top:1px solid var(--brd)">'
      +'<span>WHIP '+p.det.aWHIP+' &middot; K/BB '+p.det.aKBB+' &middot; Rest '+p.det.aRest+'d</span>'
      +'<span>BP ERA: '+p.det.aBPera+' / '+p.det.hBPera+'</span>'
      +'<span>WHIP '+p.det.hWHIP+' &middot; K/BB '+p.det.hKBB+' &middot; Rest '+p.det.hRest+'d</span>'
      +'</div>';
  }

  var gameContent='';
  if(isCancelled){
    gameContent='<div style="padding:24px;text-align:center;font-size:13px;color:var(--tx3)">Game cancelled / not played</div>';
  } else if(mode==='game'){
    if(isFinal){
      gameContent=scoreSection+liveBoard
        +'<div class="gc-pit"><div><span style="font-size:9px;color:var(--tx3)">SP</span> '+aSPDisplay+' ('+p.det.aERA+' ERA)'+aFB+'</div><div style="font-size:10px;color:var(--tx3)">'+gp.venue+'</div><div>'+hSPDisplay+' ('+p.det.hERA+' ERA)'+hFB+' <span style="font-size:9px;color:var(--tx3)">SP</span></div></div>'
        +v3HTML+pythHTML+wxHTML
        +'<div class="gc-verdict">Predicted: '+predictedWinner+' '+conf+'% — Actual: '+(live.awayScore===live.homeScore?'TIE ':live.awayScore>live.homeScore?gp.away+' wins ':gp.home+' wins ')+live.awayScore+'-'+live.homeScore+'</div>';
    } else if(isLive){
      var liveWP=calcLiveWP(p.aProb, live.awayScore, live.homeScore, live.inning, live.isTopInning, live.outs);
      var liveAWin=liveWP.away>=50;
      gameContent=liveBoard
        +'<div class="wp-row"><div class="wp-tm '+(liveAWin?'fav':'')+'"><div class="wp-abbr">'+gp.away+'</div><div class="wp-rec">'+gp.aRec+'</div><div class="wp-pct '+(liveAWin?'hi':'lo')+'">'+liveWP.away+'%</div><div class="wp-lbl">Live</div><div style="font-size:10px;color:var(--tx3);margin-top:1px">Pre: '+p.aProb+'%</div></div><div class="wp-vs">VS</div><div class="wp-tm '+(!liveAWin?'fav':'')+'"><div class="wp-abbr">'+gp.home+'</div><div class="wp-rec">'+gp.hRec+'</div><div class="wp-pct '+(!liveAWin?'hi':'lo')+'">'+liveWP.home+'%</div><div class="wp-lbl">Live</div><div style="font-size:10px;color:var(--tx3);margin-top:1px">Pre: '+p.hProb+'%</div></div></div>'
        +'<div class="wp-bar"><div style="width:'+liveWP.away+'%;background:'+(liveAWin?'#2A6CB6':'#8B909A')+';transition:width 0.5s ease"></div><div style="width:'+liveWP.home+'%;background:'+(!liveAWin?'#0F6E56':'#8B909A')+';transition:width 0.5s ease"></div></div>'
        +'<div class="gc-pit"><div><span style="font-size:9px;color:var(--tx3)">SP</span> '+aSPDisplay+'</div><div style="font-size:10px;color:var(--tx3)">'+gp.venue+'</div><div>'+hSPDisplay+' <span style="font-size:9px;color:var(--tx3)">SP</span></div></div>'
        +pythHTML+wxHTML;
    } else {
      gameContent='<div class="wp-row"><div class="wp-tm '+(aWin?'fav':'')+'"><div class="wp-abbr">'+gp.away+'</div><div class="wp-rec">'+gp.aRec+'</div><div class="wp-pct '+(aWin?'hi':'lo')+'">'+p.aProb+'%</div><div class="wp-lbl">Win prob</div></div><div class="wp-vs">VS</div><div class="wp-tm '+(!aWin?'fav':'')+'"><div class="wp-abbr">'+gp.home+'</div><div class="wp-rec">'+gp.hRec+'</div><div class="wp-pct '+(!aWin?'hi':'lo')+'">'+p.hProb+'%</div><div class="wp-lbl">Win prob</div></div></div>'
        +'<div class="wp-bar"><div style="width:'+p.aProb+'%;background:'+(aWin?'#2A6CB6':'#8B909A')+'"></div><div style="width:'+p.hProb+'%;background:'+(!aWin?'#0F6E56':'#8B909A')+'"></div></div>'
        +'<div class="gc-pit"><div><span style="font-size:9px;color:var(--tx3)">SP</span> '+aSPDisplay+' ('+p.det.aERA+' ERA)'+aFB+'</div><div style="font-size:10px;color:var(--tx3)">'+gp.venue+'</div><div>'+hSPDisplay+' ('+p.det.hERA+' ERA)'+hFB+' <span style="font-size:9px;color:var(--tx3)">SP</span></div></div>'
        +v3HTML+pythHTML+wxHTML
        +'<div class="gc-verdict">'+getVerdict(gp)+'</div>';
    }
  } else {
    if(isLive){
      gameContent='<div class="compact-score"><span class="cs-live">&#9679; LIVE '+(live.isTopInning?'Top':'Bot')+' '+live.inning+'</span><span class="cs-scores">'+gp.away+' '+live.awayScore+' - '+gp.home+' '+live.homeScore+'</span></div>';
    }
  }

  return '<div class="gc"><div class="gc-hd"><div style="display:flex;align-items:center;gap:8px"><span class="tm">'+gp.away+'</span><span class="vs_">@</span><span class="tm">'+gp.home+'</span></div><div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px">'+statusHTML+'</div></div>'
    +gameContent+batterSection+'</div>';
}

function renderBatter(b,idx,m,isFinal){
  var pct=m==='hr'?b.hrPct:b.hitPct;
  var t=m==='hr'?hrT(pct):hitT(pct);
  var did='d'+b.id+m+idx;

  var tierHTML='';
  if(m==='hr'){
    // Show implied American odds instead of hype tags
    var pctNum=+pct;
    var impliedOdds=pctNum>0?Math.round((100-pctNum)/pctNum*100):9999;
    tierHTML='<span class="tier-label" style="background:var(--sf2);color:var(--tx2)">+'+impliedOdds+'</span>';
  } else {
    tierHTML=+pct>=78?'<span class="tier-label tier-fire">&#128293; Hot</span>':+pct>=72?'<span class="tier-label tier-warm">Likely</span>':+pct>=65?'<span class="tier-label tier-mild">Even</span>':+pct>=58?'<span class="tier-label tier-cold">Lean no</span>':'<span class="tier-label tier-cold">Unlikely</span>';
  }

  var resultHTML='';
  if(b.gs&&isFinal){
    var gs=b.gs;
    var line=gs.h+'-for-'+gs.ab;
    if(gs.hr>0)line+=', '+gs.hr+' HR';
    if(gs.rbi>0)line+=', '+gs.rbi+' RBI';
    if(gs.bb>0)line+=', '+gs.bb+' BB';
    if(m==='hr'){
      resultHTML=gs.hr>0?'<div class="game-line gl-hr">'+line+' <span class="hr-badge hr-yes">&#10003; HR</span></div>':'<div class="game-line gl-out">'+line+' <span class="hr-badge hr-no">No HR</span></div>';
    } else {
      resultHTML=gs.h>0?'<div class="game-line gl-hit">'+line+' <span class="hr-badge hit-yes">&#10003; Hit</span></div>':'<div class="game-line gl-out">'+line+' <span class="hr-badge hit-no">No hit</span></div>';
    }
  } else if(!isFinal){
    resultHTML='<div class="game-line gl-pending">vs '+b.oppP+(b.oppPHand?' '+handBadge(b.oppPHand):'')+'</div>';
  }

  // H2H detail
  var h2hH=b.h2h?'<div class="h2h-b"><strong>vs '+b.oppP+':</strong> '+b.h2h.ab+'AB, '+b.h2h.h+'H, '+b.h2h.hr+'HR (career)</div>':'';

  // Platoon detail
  var platH='';
  if(b.platoon){
    platH='<div class="platoon-b"><strong>vs '+b.platoon.hand+'HP:</strong> .'+String(Math.round(parseFloat(b.platoon.avg)*1000)).padStart(3,'0')+' AVG, '+b.platoon.hrPA+'% HR/PA ('+b.platoon.pa+' PA)</div>';
  }

  // Statcast detail
  var scH='';
  if(b.statcast){
    var sc=b.statcast;
    scH='<div class="sc-b"><strong>Statcast:</strong> '
      +(sc.barrelPct>0?sc.barrelPct.toFixed(1)+'% Barrel':'')
      +(sc.exitVelo>0?' &middot; '+sc.exitVelo.toFixed(1)+' mph EV':'')
      +(sc.xBA>0?' &middot; .'+String(Math.round(sc.xBA*1000)).padStart(3,'0')+' xBA':'')
      +(sc.xSLG>0?' &middot; .'+String(Math.round(sc.xSLG*1000)).padStart(3,'0')+' xSLG':'')
      +'</div>';
  }

  // Factor row in detail — show all factors including v3
  var fKey=m==='hr'?'hrF':'hitF';
  var f=b[fKey]||{};
  var factorHTML='<div style="margin-top:6px;font-size:10px;color:var(--tx3)">Factors: ';
  if(m==='hr'){
    factorHTML+='Base '+(f.base||'-')+'% &middot; ISO &times;'+(f.iso||'-')+' &middot; Pit &times;'+(f.pitcher||'-');
    if(f.flyball&&f.flyball!=='1.00')factorHTML+=' &middot; FB &times;'+f.flyball;
    factorHTML+=' &middot; Park &times;'+(f.park||'-');
    if(f.platoon&&f.platoon!=='1.00')factorHTML+=' &middot; Plat &times;'+f.platoon;
    if(f.statcast&&f.statcast!=='1.00')factorHTML+=' &middot; SC &times;'+f.statcast;
    if(f.weather&&f.weather!=='1.00')factorHTML+=' &middot; Wx &times;'+f.weather;
    if(f.bullpen&&f.bullpen!=='1.00')factorHTML+=' &middot; BP &times;'+f.bullpen;
    if(f.lineup&&f.lineup!=='1.00')factorHTML+=' &middot; LO &times;'+f.lineup;
    if(f.h2h&&f.h2h!=='1.00')factorHTML+=' &middot; H2H &times;'+f.h2h;
  } else {
    factorHTML+='Base .'+(f.base||'-')+' &middot; Contact &times;'+(f.contact||'-')+' &middot; Pit &times;'+(f.pitcher||'-')+' &middot; Disc &times;'+(f.disc||'-');
    if(f.platoon&&f.platoon!=='1.00')factorHTML+=' &middot; Plat &times;'+f.platoon;
    if(f.statcast&&f.statcast!=='1.00')factorHTML+=' &middot; SC &times;'+f.statcast;
    if(f.lineup&&f.lineup!=='1.00')factorHTML+=' &middot; LO &times;'+f.lineup;
    if(f.h2h&&f.h2h!=='1.00')factorHTML+=' &middot; H2H &times;'+f.h2h;
  }
  factorHTML+='</div>';

  // Lineup position badge
  var loBadge=b.lineupPos?'<span class="lo-badge'+(b.lineupPos<=4?' lo-top':'')+'">'+b.lineupPos+'</span>':'';

  // Drought tag (DINGER INCOMING or SLUMP)
  var droughtHTML='';
  if(b.droughtTag){
    if(b.droughtTag.tag==='dingerIncoming'){
      droughtHTML='<span class="drought-tag tag-dinger">&#128165; DINGER INCOMING</span>';
    } else if(b.droughtTag.tag==='slump'){
      droughtHTML='<span class="drought-tag tag-slump">SLUMP</span>';
    }
  }

  return '<div class="br" onclick="document.getElementById(\''+did+'\').classList.toggle(\'open\')">'
    +'<div class="brk '+tCls(t)+'">'+(idx+1)+'</div>'
    +'<div class="bi"><div class="bn">'+b.name+loBadge+droughtHTML+'</div>'+resultHTML+'</div>'
    +'<div class="bp"><div class="bpc t'+t+'">'+pct+'%</div>'+tierHTML+'</div>'
    +'</div>'
    +'<div class="bd" id="'+did+'"><div class="dg">'
    +'<div class="di"><div class="dl">AVG</div><div class="dv">.'+String(Math.round((b.avg||0)*1000)).padStart(3,'0')+'</div></div>'
    +'<div class="di"><div class="dl">ISO</div><div class="dv">.'+String(Math.round((b.iso||0)*1000)).padStart(3,'0')+'</div></div>'
    +'<div class="di"><div class="dl">OBP</div><div class="dv">.'+String(Math.round((b.obp||0)*1000)).padStart(3,'0')+'</div></div>'
    +'<div class="di"><div class="dl">3yr HR</div><div class="dv">'+(b.totHR||0)+'</div></div>'
    +'</div>'+h2hH+platH+scH
    +(b.droughtTag?'<div style="margin-top:6px;padding:6px 8px;border-radius:6px;font-size:11px;border-left:3px solid '+(b.droughtTag.tag==='dingerIncoming'?'#E65100':'var(--tx3)')+';background:'+(b.droughtTag.tag==='dingerIncoming'?'#FFF3E0':'var(--sf2)')+';color:'+(b.droughtTag.tag==='dingerIncoming'?'#E65100':'var(--tx3)')+'"><strong>'+b.droughtTag.drought+' games without HR</strong> &middot; Expected every '+b.droughtTag.expected+' games &middot; '+b.droughtTag.ratio+'x overdue</div>':'')
    +factorHTML+'</div>';
}

function getVerdict(gp){
  var p=gp.pred;var conf=Math.max(p.aProb,p.hProb);var fav=p.aProb>=50?gp.away:gp.home;
  if(conf>=65)return'Model strongly favors '+fav+'. Predicted: '+gp.away+' '+p.aRuns.toFixed(1)+' - '+gp.home+' '+p.hRuns.toFixed(1);
  if(conf>=55)return'Slight lean '+fav+'. Predicted: '+gp.away+' '+p.aRuns.toFixed(1)+' - '+gp.home+' '+p.hRuns.toFixed(1);
  return'Toss-up. Predicted: '+gp.away+' '+p.aRuns.toFixed(1)+' - '+gp.home+' '+p.hRuns.toFixed(1);
}

function renderRecordBar(){
  if(!data||!data.gamePreds)return;
  if(mode==='game'){
    var correct=0,wrong=0,pending=0;
    data.gamePreds.forEach(function(gp){
      var live=getLiveData(gp.gamePk);
      if(!live||live.status!=='Final'){pending++;return}
      if(live.awayScore===0&&live.homeScore===0&&(live.awayHits||0)===0&&(live.homeHits||0)===0)return;
      var predicted=gp.pred.aProb>=50?gp.away:gp.home;
      var actual=live.awayScore>live.homeScore?gp.away:live.homeScore>live.awayScore?gp.home:'TIE';
      if(actual==='TIE')return; // spring training ties — don't count
      if(predicted===actual)correct++;else wrong++;
    });
    var total=correct+wrong;
    if(total===0){document.getElementById('recordBar').innerHTML='';return}
    var pct=total>0?Math.round(correct/total*100):0;
    document.getElementById('recordBar').innerHTML='<div class="record-bar">'
      +'<span class="rec-item correct">&#10003; '+correct+' Correct</span>'
      +'<span class="rec-item wrong">&#10007; '+wrong+' Wrong</span>'
      +(pending>0?'<span class="rec-item pending">&#9679; '+pending+' Pending</span>':'')
      +'<span style="color:var(--tx);font-weight:700">'+pct+'% accuracy</span>'
      +'</div>';
  } else {
    var key=mode==='hr'?'hrPct':'hitPct';
    var hit=0,miss=0,pending=0,topHit=0,topMiss=0;
    data.batters.forEach(function(b){
      if(!b.gs){pending++;return}
      var success=mode==='hr'?(b.gs.hr>0):(b.gs.h>0);
      if(success)hit++;else miss++;
      if(+b[key]>=10&&mode==='hr'||+b[key]>=70&&mode!=='hr'){if(success)topHit++;else topMiss++;}
    });
    var total=hit+miss;
    if(total===0){document.getElementById('recordBar').innerHTML='';return}
    var topTotal=topHit+topMiss;
    var lbl=mode==='hr'?'HRs hit':'Hits';
    document.getElementById('recordBar').innerHTML='<div class="record-bar">'
      +'<span class="rec-item correct">&#10003; '+hit+' '+lbl+'</span>'
      +'<span class="rec-item wrong">&#10007; '+miss+' Without</span>'
      +(topTotal>0?'<span style="color:var(--acc);font-weight:600">Top picks: '+topHit+'/'+topTotal+'</span>':'')
      +(pending>0?'<span class="rec-item pending">&#9679; '+pending+' Pending</span>':'')
      +'</div>';
  }
}

function renderLB(m){
  if(!data||!data.batters.length&&m!=='game')return'<div class="empty"><h3>No batter data</h3><p>Check back when lineups are posted</p></div>';
  if(m==='game'){
    var sorted=data.gamePreds.slice().sort(function(a,b){return Math.max(b.pred.aProb,b.pred.hProb)-Math.max(a.pred.aProb,a.pred.hProb)});
    var h='<div style="font-size:15px;font-weight:700;margin-bottom:12px">Strongest picks</div><div class="lbc">';
    sorted.forEach(function(gp,i){
      var c=Math.max(gp.pred.aProb,gp.pred.hProb);
      var fav=gp.pred.aProb>=50?gp.away:gp.home;
      var dog=gp.pred.aProb>=50?gp.home:gp.away;
      var live=getLiveData(gp.gamePk);
      var resultHTML='';
      if(live&&live.status==='Final'&&!(live.awayScore===0&&live.homeScore===0&&(live.awayHits||0)===0&&(live.homeHits||0)===0)){
        var actual=live.awayScore>live.homeScore?gp.away:gp.home;
        var ok=fav===actual;
        resultHTML=' <span class="pred-result '+(ok?'pred-correct':'pred-wrong')+'" style="font-size:9px">'+(ok?'&#10003;':'&#10007;')+'</span>';
      }
      h+='<div class="lbr"><div class="lbn '+(i<3?'t3':'')+'">'+(i+1)+'</div><div class="lbi"><div class="lbna">'+fav+' over '+dog+resultHTML+'</div><div class="lbsu">'+(live&&live.status==='Final'?'Final '+live.awayScore+'-'+live.homeScore:'Pred: '+gp.pred.aRuns.toFixed(1)+'-'+gp.pred.hRuns.toFixed(1)+' | Pyth: '+(gp.pred.det.aPyth||'-')+'% vs '+(gp.pred.det.hPyth||'-')+'%')+'</div></div><div class="lbpv" style="color:'+(c>=65?'var(--grn)':c>=55?'var(--acc)':'var(--tx3)')+'">'+c+'%</div></div>';
    });
    return h+'</div>';
  }
  var key=m==='hr'?'hrPct':'hitPct';
  var sorted=data.batters.slice().sort(function(a,b){return(+b[key])-(+a[key])}).slice(0,25);
  var lbl=m==='hr'?'HR':'hit';
  var h='<div style="font-size:15px;font-weight:700;margin-bottom:12px">Top '+lbl+' candidates</div><div class="lbc">';
  sorted.forEach(function(b,i){
    var pct=b[key];var t=m==='hr'?hrT(pct):hitT(pct);
    var resHTML='';
    if(b.gs){
      var ok=m==='hr'?(b.gs.hr>0):(b.gs.h>0);
      resHTML=ok?'<span class="hr-badge '+(m==='hr'?'hr-yes':'hit-yes')+'">&#10003; '+(m==='hr'?b.gs.hr+' HR':b.gs.h+'-'+b.gs.ab)+'</span>':'<span class="hr-badge '+(m==='hr'?'hr-no':'hit-no')+'">'+b.gs.h+'-'+b.gs.ab+'</span>';
    }
    // Build subtitle with platoon + statcast hints
    var sub=b.team+' vs '+b.oppP+(b.oppPHand?' ('+b.oppPHand+'HP)':'');
    if(m==='hr'){
      sub+=' &middot; '+b.totHR+'HR &middot; .'+String(Math.round((b.iso||0)*1000)).padStart(3,'0')+' ISO';
      if(b.statcast&&b.statcast.barrelPct>0)sub+=' &middot; '+b.statcast.barrelPct.toFixed(1)+'% Brl';
    } else {
      sub+=' &middot; .'+String(Math.round((b.avg||0)*1000)).padStart(3,'0')+' AVG';
      if(b.statcast&&b.statcast.xBA>0)sub+=' &middot; .'+String(Math.round(b.statcast.xBA*1000)).padStart(3,'0')+' xBA';
    }
    // Drought tag for leaderboard
    var lbDrought='';
    if(b.droughtTag){
      if(b.droughtTag.tag==='dingerIncoming') lbDrought=' <span class="drought-tag tag-dinger">&#128165; DINGER INCOMING</span>';
      else if(b.droughtTag.tag==='slump') lbDrought=' <span class="drought-tag tag-slump">SLUMP</span>';
    }
    h+='<div class="lbr"><div class="lbn '+(i<3?'t3':'')+'">'+(i+1)+'</div><div class="lbi"><div class="lbna">'+b.name+' '+resHTML+lbDrought+'</div><div class="lbsu">'+sub+'</div></div><div class="lbpv" style="color:'+tCol(t)+'">'+pct+'%</div></div>';
  });
  return h+'</div>';
}

function updateModelBadge(){
  if(!data)return;
  var mi=data.modelInfo||{};
  var el=document.getElementById('mi-sc');
  if(mi.statcast&&mi.statcastCount>0){
    el.className='mi-on';el.innerHTML='&#10003; ('+mi.statcastCount+')';
  } else {
    el.className='mi-off';el.textContent='unavailable';
  }
  var badge=document.getElementById('modelBadge');
  badge.textContent=data.modelVersion||'v3';
}

function render(){
  var el=document.getElementById('out');
  if(!data){el.innerHTML='<div class="ld"><div class="sp"></div>Loading predictions...</div>';return}
  if(!data.gamePreds||!data.gamePreds.length){el.innerHTML='<div class="empty"><h3>No games on this date</h3><p>Use arrows to navigate</p></div>';return}
  renderRecordBar();
  // Save open batter details before re-render
  var openIds=[];
  el.querySelectorAll('.bd.open').forEach(function(d){if(d.id)openIds.push(d.id)});
  if(sub_==='lb'){el.innerHTML=renderLB(mode);return}
  // Sort: Live games top, upcoming middle, finished bottom
  var sorted=data.gamePreds.slice().sort(function(a,b){
    var la=liveScores[a.gamePk]||{};
    var lb_=liveScores[b.gamePk]||{};
    var sa=la.status==='Live'?0:la.status==='Final'?2:1;
    var sb=lb_.status==='Live'?0:lb_.status==='Final'?2:1;
    if(sa!==sb)return sa-sb;
    // Within same status, keep original game time order
    return 0;
  });
  el.innerHTML=sorted.map(renderGameCard).join('');
  // Restore open batter details after re-render
  openIds.forEach(function(id){var d=document.getElementById(id);if(d)d.classList.add('open')});
}

async function loadData(){
  var el=document.getElementById('out');
  data=null;liveScores={};
  updateDateUI();
  document.getElementById('recordBar').innerHTML='';
  el.innerHTML='<div class="ld"><div class="sp"></div>Loading predictions...</div>';
  if(refreshTimer){clearInterval(refreshTimer);refreshTimer=null}
  render30DayBar();
  try{
    var r=await fetch('/api/data?date='+dateStr(currentDate));
    if(!r.ok)throw new Error('Server returned '+r.status);
    data=await r.json();
    document.getElementById('bg').textContent=data.gamePreds?data.gamePreds.length:0;
    document.getElementById('bhr').textContent=data.batters?data.batters.length:'-';
    document.getElementById('bht').textContent=data.batters?data.batters.length:'-';
    updateModelBadge();
    render();startLiveRefresh();
  }catch(err){
    el.innerHTML='<div style="background:var(--redB);border-radius:14px;padding:24px;text-align:center"><strong style="color:var(--red)">Error loading data</strong><p style="font-size:13px;color:var(--red);margin-top:6px">'+err.message+'</p></div>';
  }
}

function startLiveRefresh(){fetchScores();refreshTimer=setInterval(fetchScores,10000)}
async function fetchScores(){
  try{
    var r=await fetch('/api/scores?date='+dateStr(currentDate));
    if(!r.ok)return;
    var d=await r.json();
    var anyLive=false;
    (d.scores||[]).forEach(function(s){liveScores[s.gamePk]=s;if(s.status==='Live')anyLive=true});
    document.getElementById('liveInd').style.display=anyLive?'':'none';
    document.getElementById('refreshBar').style.display=anyLive?'':'none';
    render();
    tryRecordAccuracy();
  }catch(e){}
}

updateDateUI();loadData();
</script>
