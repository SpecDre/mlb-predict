<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLB Predict</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5F3EE;--sf:#FFF;--sf2:#EDE9E0;--tx:#1A1A18;--tx2:#6B6960;--tx3:#9B9788;--acc:#BA7517;--accL:#FAEEDA;--grn:#4A8C1C;--grnB:#EAF3DE;--red:#C43028;--redB:#FCEBEB;--blu:#2A6CB6;--bluB:#E6F1FB;--pur:#6B5BC0;--purB:#EEEDFE;--teal:#0F6E56;--tealB:#E1F5EE;--brd:rgba(0,0,0,.08);--r:10px;--rl:14px}
@media(prefers-color-scheme:dark){:root{--bg:#1A1918;--sf:#252422;--sf2:#302E2A;--tx:#E8E5DD;--tx2:#A09C92;--tx3:#6B6960;--acc:#EF9F27;--accL:#412402;--grn:#97C459;--grnB:#1E2E0D;--red:#F09595;--redB:#3A1616;--blu:#85B7EB;--bluB:#122540;--pur:#AFA9EC;--purB:#26215C;--teal:#5DCAA5;--tealB:#04342C;--brd:rgba(255,255,255,.08)}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.app{max-width:880px;margin:0 auto;padding:20px 16px 100px}
h1{font-family:'Playfair Display',serif;font-weight:900;font-size:26px;letter-spacing:-.5px}
.hdr{margin-bottom:20px}.hdr-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:4px}
.logo{display:flex;align-items:center;gap:10px}
.logo-m{width:40px;height:40px;border-radius:10px;background:var(--acc);display:flex;align-items:center;justify-content:center}
.logo-m svg{width:22px;height:22px}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--red);display:inline-block;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sub-h{font-size:14px;color:var(--tx2);line-height:1.5}

.date-nav{display:flex;align-items:center;gap:8px;margin:14px 0;justify-content:center}
.date-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--brd);background:var(--sf);color:var(--tx);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px}
.date-main{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;text-align:center;min-width:200px}
.date-sub{font-size:11px;color:var(--tx3);text-align:center;margin-top:2px}

.modes{display:flex;gap:4px;background:var(--sf2);border-radius:var(--r);padding:4px;margin-bottom:16px}
.mbtn{flex:1;padding:10px 6px;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;background:transparent;color:var(--tx2);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}
.mbtn.act{background:var(--sf);color:var(--tx);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.mbdg{font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px}
.bdg-g{background:var(--tealB);color:var(--teal)}.bdg-hr{background:var(--redB);color:var(--red)}.bdg-h{background:var(--bluB);color:var(--blu)}

.ld{text-align:center;padding:60px 20px;color:var(--tx2)}
.sp{width:36px;height:36px;border:3px solid var(--brd);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Game card */
.gc{background:var(--sf);border-radius:var(--rl);border:1px solid var(--brd);margin-bottom:14px;overflow:hidden}
.gc-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--sf2);border-bottom:1px solid var(--brd);flex-wrap:wrap;gap:6px}
.tm{font-size:15px;font-weight:700}.vs_{font-size:11px;color:var(--tx3)}
.gc-live{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600}
.gc-live .score{font-family:'Playfair Display',serif;font-size:18px;font-weight:900}
.gc-live .inning{font-size:10px;color:var(--tx3);text-transform:uppercase}

/* Win prob display */
.wp-row{display:flex;align-items:stretch}
.wp-tm{flex:1;padding:14px;display:flex;flex-direction:column;align-items:center;gap:3px}
.wp-tm.fav{background:var(--grnB)}
.wp-abbr{font-size:24px;font-weight:900;font-family:'Playfair Display',serif}
.wp-rec{font-size:11px;color:var(--tx3)}
.wp-pct{font-size:28px;font-weight:900;font-family:'Playfair Display',serif}
.wp-pct.hi{color:var(--grn)}.wp-pct.lo{color:var(--tx3)}
.wp-lbl{font-size:9px;color:var(--tx3);text-transform:uppercase}
.wp-vs{display:flex;align-items:center;justify-content:center;width:40px;font-size:11px;color:var(--tx3);font-weight:600}
.wp-bar{padding:0 16px 10px;display:flex;gap:2px}
.wp-bar>div{height:8px;border-radius:4px}

.gc-pit{display:flex;justify-content:space-between;padding:8px 16px;border-top:1px solid var(--brd);font-size:12px;color:var(--tx2)}
.gc-verdict{margin:4px 16px 12px;padding:8px 12px;border-radius:8px;font-size:12px;line-height:1.5;border-left:3px solid var(--acc);background:var(--sf2);color:var(--tx2)}

/* Batter row */
.slb{padding:6px 16px 3px;font-size:10px;color:var(--tx3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;border-top:1px solid var(--brd)}
.br{display:flex;align-items:center;padding:8px 16px;gap:8px;cursor:pointer}
.br:hover{background:var(--sf2)}
.brk{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.rk-f{background:var(--redB);color:var(--red)}.rk-h{background:var(--accL);color:var(--acc)}.rk-o{background:var(--grnB);color:var(--grn)}.rk-c{background:var(--sf2);color:var(--tx3)}
.bi{flex:1;min-width:0}.bn{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bm{font-size:11px;color:var(--tx3)}
.bp{text-align:right;flex-shrink:0}.bpc{font-size:17px;font-weight:700}
.bpc.tf{color:var(--red)}.bpc.th{color:var(--acc)}.bpc.to{color:var(--grn)}.bpc.tc{color:var(--tx3)}
.bpl{font-size:8px;color:var(--tx3);text-transform:uppercase}

.bd{display:none;padding:2px 16px 10px 48px}.bd.open{display:block}
.dg{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:4px}
.di{background:var(--sf2);border-radius:6px;padding:4px 8px}
.dl{font-size:9px;color:var(--tx3);text-transform:uppercase}.dv{font-size:13px;font-weight:600}
.h2h-b{margin-top:6px;padding:6px 8px;border-radius:6px;font-size:11px;border-left:3px solid var(--pur);background:var(--purB);color:var(--pur)}

/* Leaderboard */
.lbc{background:var(--sf);border-radius:var(--rl);border:1px solid var(--brd);overflow:hidden}
.lbr{display:flex;align-items:center;padding:10px 16px;gap:10px;border-bottom:1px solid var(--brd)}
.lbr:last-child{border-bottom:none}
.lbn{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;color:var(--tx3);width:26px;text-align:center}
.lbn.t3{color:var(--acc)}
.lbi{flex:1;min-width:0}.lbna{font-size:14px;font-weight:600}
.lbsu{font-size:11px;color:var(--tx3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lbpv{font-size:18px;font-weight:700;text-align:right}

.stabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.stab{padding:6px 14px;border:1px solid var(--brd);border-radius:20px;font-size:12px;font-weight:500;background:var(--sf);color:var(--tx2);cursor:pointer}
.stab.act{background:var(--tx);color:var(--bg);border-color:var(--tx)}

.empty{text-align:center;padding:50px 20px}.empty h3{font-size:16px;margin-bottom:6px}.empty p{font-size:13px;color:var(--tx2)}
.refresh-bar{text-align:center;font-size:11px;color:var(--tx3);padding:6px 0}
@media(max-width:600px){.wp-row{flex-direction:column}.wp-vs{width:100%;padding:2px 0}h1{font-size:22px}}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-top">
      <div class="logo">
        <div class="logo-m"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M3.5 12C6 12 8 9 8 6.5M3.5 12C6 12 8 15 8 17.5M20.5 12C18 12 16 9 16 6.5M20.5 12C18 12 16 15 16 17.5"/></svg></div>
        <h1>MLB Predict</h1>
      </div>
      <div id="liveInd" style="display:none"><span class="live-dot"></span> <span style="font-size:12px;color:var(--red);font-weight:600">LIVE</span></div>
    </div>
    <p class="sub-h">Game picks, HR &amp; hit probabilities — instant server-side predictions</p>
  </div>

  <div class="date-nav">
    <button class="date-btn" onclick="changeDate(-1)">&#8249;</button>
    <div><div class="date-main" id="dateMain">Loading...</div><div class="date-sub" id="dateSub"></div></div>
    <button class="date-btn" onclick="changeDate(1)">&#8250;</button>
  </div>

  <div class="modes">
    <button class="mbtn act" data-m="game" onclick="setMode('game')">&#9917; Games <span class="mbdg bdg-g" id="bg">-</span></button>
    <button class="mbtn" data-m="hr" onclick="setMode('hr')">&#128165; HR <span class="mbdg bdg-hr" id="bhr">-</span></button>
    <button class="mbtn" data-m="hit" onclick="setMode('hit')">&#127951; Hits <span class="mbdg bdg-h" id="bht">-</span></button>
  </div>

  <div class="stabs">
    <button class="stab act" data-s="main" onclick="setSub('main')">By game</button>
    <button class="stab" data-s="lb" onclick="setSub('lb')">Leaderboard</button>
  </div>

  <div id="refreshBar" class="refresh-bar" style="display:none">Live scores updating every 10s</div>
  <div id="out"></div>
</div>
<script>
var mode='game',sub_='main',currentDate=new Date(),data=null,liveScores={},refreshTimer=null;

var dateStr=function(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')};
var fTime=function(iso){if(!iso)return'';return new Date(iso).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})};

function updateDateUI(){
  var d=currentDate;
  document.getElementById('dateMain').textContent=d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  var today=new Date();var diff=Math.round((d-today)/(864e5));
  document.getElementById('dateSub').textContent=diff===0?'Today':diff===1?'Tomorrow':diff===-1?'Yesterday':diff>0?diff+' days ahead':Math.abs(diff)+' days ago';
}

function changeDate(delta){currentDate=new Date(currentDate.getTime()+delta*864e5);updateDateUI();loadData()}
function setMode(m){mode=m;document.querySelectorAll('.mbtn').forEach(function(b){b.classList.toggle('act',b.dataset.m===m)});render()}
function setSub(s){sub_=s;document.querySelectorAll('.stab').forEach(function(b){b.classList.toggle('act',b.dataset.s===s)});render()}

// Tier helpers
function hrT(p){p=+p;return p>=12?'f':p>=7?'h':p>=4?'o':'c'}
function hitT(p){p=+p;return p>=85?'f':p>=75?'h':p>=60?'o':'c'}
function tCls(t){return'rk-'+t}
function tCol(t){return t==='f'?'var(--red)':t==='h'?'var(--acc)':t==='o'?'var(--grn)':'var(--tx3)'}

function renderGameCard(gp){
  var p=gp.pred;var aWin=p.aProb>=50;
  var conf=Math.max(p.aProb,p.hProb);
  var confL=conf>=65?'Strong pick':conf>=55?'Lean':'Toss-up';
  var live=liveScores[gp.gamePk];
  var isLive=live&&live.status==='Live';
  var isFinal=live&&live.status==='Final';
  var statusHTML='';
  if(isLive){statusHTML='<div class="gc-live"><span class="live-dot"></span> <span class="score">'+live.awayScore+'-'+live.homeScore+'</span> <span class="inning">'+(live.isTopInning?'Top':'Bot')+' '+live.inning+'</span></div>'}
  else if(isFinal){statusHTML='<div style="font-size:12px;color:var(--tx3);font-weight:600">Final '+live.awayScore+'-'+live.homeScore+'</div>'}
  else{statusHTML='<div style="font-size:12px;color:var(--blu);font-weight:600">'+fTime(gp.gameDate)+'</div>'}

  var batters=data?data.batters.filter(function(b){return b.gamePk===gp.gamePk}):[]; 
  var awayB=batters.filter(function(b){return b.side==='away'});
  var homeB=batters.filter(function(b){return b.side==='home'});

  var batterSection='';
  if(mode!=='game'&&(awayB.length||homeB.length)){
    var key=mode==='hr'?'hrPct':'hitPct';
    awayB.sort(function(a,b){return(+b[key])-(+a[key])});
    homeB.sort(function(a,b){return(+b[key])-(+a[key])});
    if(awayB.length)batterSection+='<div class="slb">'+gp.away+' batters</div>'+awayB.map(function(b,i){return renderBatter(b,i,mode)}).join('');
    if(homeB.length)batterSection+='<div class="slb">'+gp.home+' batters</div>'+homeB.map(function(b,i){return renderBatter(b,i,mode)}).join('');
  } else if(mode!=='game'){
    batterSection='<div style="padding:16px;text-align:center;font-size:12px;color:var(--tx3)">Lineups not yet available</div>';
  }

  return '<div class="gc"><div class="gc-hd"><div style="display:flex;align-items:center;gap:8px"><span class="tm">'+gp.away+'</span><span class="vs_">@</span><span class="tm">'+gp.home+'</span></div>'+statusHTML+'</div>'
    +(mode==='game'?'<div class="wp-row"><div class="wp-tm '+(aWin?'fav':'')+'"><div class="wp-abbr">'+gp.away+'</div><div class="wp-rec">'+gp.aRec+'</div><div class="wp-pct '+(aWin?'hi':'lo')+'">'+p.aProb+'%</div><div class="wp-lbl">Win prob</div></div><div class="wp-vs">VS</div><div class="wp-tm '+(!aWin?'fav':'')+'"><div class="wp-abbr">'+gp.home+'</div><div class="wp-rec">'+gp.hRec+'</div><div class="wp-pct '+(!aWin?'hi':'lo')+'">'+p.hProb+'%</div><div class="wp-lbl">Win prob</div></div></div><div class="wp-bar"><div style="width:'+p.aProb+'%;background:'+(aWin?'#2A6CB6':'#9B9788')+'"></div><div style="width:'+p.hProb+'%;background:'+(!aWin?'#0F6E56':'#9B9788')+'"></div></div><div class="gc-pit"><div><span style="font-size:9px;color:var(--tx3)">SP</span> '+gp.awaySP+' ('+p.det.aERA+' ERA)</div><div style="font-size:10px;color:var(--tx3)">'+gp.venue+'</div><div>'+gp.homeSP+' ('+p.det.hERA+' ERA) <span style="font-size:9px;color:var(--tx3)">SP</span></div></div><div class="gc-verdict">'+getVerdict(gp)+'</div>':'')
    +batterSection+'</div>';
}

function renderBatter(b,idx,m){
  var pct=m==='hr'?b.hrPct:b.hitPct;var t=m==='hr'?hrT(pct):hitT(pct);
  var did='d'+b.id+m+idx;
  var h2hH=b.h2h?'<div class="h2h-b"><strong>vs '+b.oppP+':</strong> '+b.h2h.ab+'AB, '+b.h2h.h+'H, '+b.h2h.hr+'HR</div>':'';
  return '<div class="br" onclick="document.getElementById(\''+did+'\').classList.toggle(\'open\')"><div class="brk '+tCls(t)+'">'+(idx+1)+'</div><div class="bi"><div class="bn">'+b.name+'</div><div class="bm">'+b.pos+' · '+b.team+'</div></div><div class="bp"><div class="bpc t'+t+'">'+pct+'%</div><div class="bpl">'+(m==='hr'?'HR':'Hit')+'</div></div></div>'
    +'<div class="bd" id="'+did+'"><div class="dg"><div class="di"><div class="dl">AVG</div><div class="dv">.'+String(Math.round((b.avg||0)*1000)).padStart(3,'0')+'</div></div><div class="di"><div class="dl">ISO</div><div class="dv">.'+String(Math.round((b.iso||0)*1000)).padStart(3,'0')+'</div></div><div class="di"><div class="dl">OBP</div><div class="dv">.'+String(Math.round((b.obp||0)*1000)).padStart(3,'0')+'</div></div><div class="di"><div class="dl">3yr HR</div><div class="dv">'+(b.totHR||0)+'</div></div></div>'+h2hH+'</div>';
}

function getVerdict(gp){
  var p=gp.pred;var conf=Math.max(p.aProb,p.hProb);var fav=p.aProb>=50?gp.away:gp.home;
  if(conf>=65)return'Model strongly favors '+fav+'. Predicted: '+gp.away+' '+p.aRuns.toFixed(1)+' - '+gp.home+' '+p.hRuns.toFixed(1);
  if(conf>=55)return'Slight lean '+fav+'. Predicted: '+gp.away+' '+p.aRuns.toFixed(1)+' - '+gp.home+' '+p.hRuns.toFixed(1);
  return'Toss-up. Predicted: '+gp.away+' '+p.aRuns.toFixed(1)+' - '+gp.home+' '+p.hRuns.toFixed(1);
}

function renderLB(m){
  if(!data||!data.batters.length)return'<div class="empty"><h3>No batter data</h3><p>Check back when lineups are posted</p></div>';
  if(m==='game'){
    var sorted=data.gamePreds.slice().sort(function(a,b){return Math.max(b.pred.aProb,b.pred.hProb)-Math.max(a.pred.aProb,a.pred.hProb)});
    var h='<div style="font-size:15px;font-weight:700;margin-bottom:12px">Strongest picks</div><div class="lbc">';
    sorted.forEach(function(gp,i){var c=Math.max(gp.pred.aProb,gp.pred.hProb);var fav=gp.pred.aProb>=50?gp.away:gp.home;var dog=gp.pred.aProb>=50?gp.home:gp.away;h+='<div class="lbr"><div class="lbn '+(i<3?'t3':'')+'">'+(i+1)+'</div><div class="lbi"><div class="lbna">'+fav+' over '+dog+'</div><div class="lbsu">Pred: '+gp.pred.aRuns.toFixed(1)+'-'+gp.pred.hRuns.toFixed(1)+'</div></div><div class="lbpv" style="color:'+(c>=65?'var(--grn)':c>=55?'var(--acc)':'var(--tx3)')+'">'+c+'%</div></div>'});
    return h+'</div>';
  }
  var key=m==='hr'?'hrPct':'hitPct';
  var sorted=data.batters.slice().sort(function(a,b){return(+b[key])-(+a[key])}).slice(0,25);
  var h='<div style="font-size:15px;font-weight:700;margin-bottom:12px">Top '+(m==='hr'?'HR':'hit')+' candidates</div><div class="lbc">';
  sorted.forEach(function(b,i){var pct=b[key];var t=m==='hr'?hrT(pct):hitT(pct);h+='<div class="lbr"><div class="lbn '+(i<3?'t3':'')+'">'+(i+1)+'</div><div class="lbi"><div class="lbna">'+b.name+'</div><div class="lbsu">'+b.team+' · '+(m==='hr'?b.totHR+'HR · .'+String(Math.round((b.iso||0)*1000)).padStart(3,'0')+' ISO':'.'+String(Math.round((b.avg||0)*1000)).padStart(3,'0')+' AVG')+' vs '+b.oppP+'</div></div><div class="lbpv" style="color:'+tCol(t)+'">'+pct+'%</div></div>'});
  return h+'</div>';
}

function render(){
  var el=document.getElementById('out');
  if(!data){el.innerHTML='<div class="ld"><div class="sp"></div>Loading predictions...</div>';return}
  if(!data.gamePreds||!data.gamePreds.length){el.innerHTML='<div class="empty"><h3>No games on this date</h3><p>Use arrows to navigate</p></div>';return}
  if(sub_==='lb'){el.innerHTML=renderLB(mode);return}
  el.innerHTML=data.gamePreds.map(renderGameCard).join('');
}

// ====== DATA LOADING — ONE CALL ======
async function loadData(){
  var el=document.getElementById('out');
  data=null;liveScores={};
  updateDateUI();
  el.innerHTML='<div class="ld"><div class="sp"></div>Loading predictions from server...</div>';

  if(refreshTimer){clearInterval(refreshTimer);refreshTimer=null}

  try{
    var r=await fetch('/api/data?date='+dateStr(currentDate));
    if(!r.ok)throw new Error('Server returned '+r.status);
    data=await r.json();

    document.getElementById('bg').textContent=data.gamePreds?data.gamePreds.length:0;
    document.getElementById('bhr').textContent=data.batters?data.batters.length:'-';
    document.getElementById('bht').textContent=data.batters?data.batters.length:'-';

    render();
    startLiveRefresh();
  }catch(err){
    el.innerHTML='<div style="background:var(--redB);border-radius:14px;padding:24px;text-align:center"><strong style="color:var(--red)">Error loading data</strong><p style="font-size:13px;color:var(--red);margin-top:6px">'+err.message+'</p></div>';
  }
}

// ====== LIVE SCORES — EVERY 10 SECONDS ======
function startLiveRefresh(){
  fetchScores();
  refreshTimer=setInterval(fetchScores,10000);
}

async function fetchScores(){
  try{
    var r=await fetch('/api/scores?date='+dateStr(currentDate));
    if(!r.ok)return;
    var d=await r.json();
    var anyLive=false;
    (d.scores||[]).forEach(function(s){
      liveScores[s.gamePk]=s;
      if(s.status==='Live')anyLive=true;
    });
    document.getElementById('liveInd').style.display=anyLive?'':'none';
    document.getElementById('refreshBar').style.display=anyLive?'':'none';
    render();
  }catch(e){}
}

// Init
updateDateUI();
loadData();
</script>
</body>
</html>
